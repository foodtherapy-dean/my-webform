<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정기검증 취합 (월별)</title>
<style>
  body { font-family: 'Pretendard', sans-serif; margin:16px; background: #f9f9f9; }
  h2 { text-align:center; color: #333; }
  .controls { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:15px; }
  .controls button { padding:8px 12px; border-radius:6px; border:1px solid #ddd; background:#fff; cursor:pointer; font-weight: bold; }
  .controls button:active { background: #eee; }
  .controls input[type="month"] { padding:7px; border-radius:6px; border:1px solid #ddd; font-size: 16px; }
  
  table { width:100%; border-collapse: collapse; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  th, td { border:1px solid #eee; padding:10px 5px; text-align:center; }
  th { background:#f4f4f4; color: #555; font-size: 14px; }
  td.clickable { cursor: pointer; font-size: 22px; transition: background 0.2s; }
  td.clickable:hover { background: #f0f0f0; }
  
  tr.sunday { background:#fff5f5; color: #d9534f; }
  tr.saturday { background:#f7faff; color: #337ab7; }
  .small { font-size:12px; color:#888; text-align: center; margin-top: 15px; }
  
  /* 로딩 표시 */
  #loader { display: none; text-align: center; padding: 20px; font-weight: bold; color: #4caf50; }
</style>
</head>
<body>

<h2>📅 정기검증 월별 취합</h2>

<div class="controls">
  <button id="prevMonth">&lt;</button>
  <input type="month" id="monthInput" />
  <button id="nextMonth">&gt;</button>
  <button id="openMonthBtn" style="background: #4caf50; color: white; border: none;">월별 리포트</button>
</div>

<div id="loader">🚀 데이터를 광속으로 가져오는 중...</div>

<table id="statusTable">
  <thead id="tableHead"></thead>
  <tbody id="tableBody"></tbody>
</table>

<div id="note" class="small">● 완료 | ○ 미완료 | 클릭 시 입력폼 이동</div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbxO1M_Xi1qreMUPgWTyVOThmFI6ddfFdvnVRERZQ89YUyM5OxUakwlj9r0-7HVPSiZHng/exec"; // 본인의 URL로 교체

const CELL_MAP = [
  { p: "주간", i: "방재점검" }, { p: "주간", i: "용수관리" },
  { p: "월간", i: "CCP검증" }, { p: "월간", i: "위생교육" }
];
const WEEKDAYS = ["일","월","화","수","목","금","토"];
const monthInput = document.getElementById("monthInput");
const tableBody = document.getElementById("tableBody");
const loader = document.getElementById("loader");

let dataCache = {}; // [핵심] 클라이언트 캐시 저장소

async function loadData() {
  const [year, month] = monthInput.value.split("-");
  const cacheKey = `${year}-${month}`;

  // 캐시된 데이터가 있으면 서버 호출 없이 즉시 실행
  if (dataCache[cacheKey]) {
    renderTable(dataCache[cacheKey], year, month);
    return;
  }

  tableBody.innerHTML = "";
  loader.style.display = "block";

  try {
    const resp = await fetch(`${BASE_URL}?mode=data&year=${year}&month=${month}`);
    const json = await resp.json();
    if(json.success) {
      dataCache[cacheKey] = json.data; // 서버 데이터를 캐시에 저장
      renderTable(json.data, year, month);
    }
  } catch(err) {
    tableBody.innerHTML = `<tr><td colspan="6">데이터 로드 실패</td></tr>`;
  } finally {
    loader.style.display = "none";
  }
}

function renderTable(data, year, month) {
  // 헤더 생성 (생략 방지를 위해 고정 생성)
  document.getElementById("tableHead").innerHTML = `
    <tr><th rowspan="2">날짜</th><th rowspan="2">요일</th><th colspan="2">주간</th><th colspan="2">월간</th></tr>
    <tr><th>방재점검</th><th>용수관리</th><th>CCP검증</th><th>위생교육</th></tr>`;

  tableBody.innerHTML = "";
  const lastDay = new Date(year, month, 0).getDate();

  for (let d = 1; d <= lastDay; d++) {
    const dateObj = new Date(year, month - 1, d);
    const dateStr = `${year}-${month}-${String(d).padStart(2,"0")}`;
    const wday = WEEKDAYS[dateObj.getDay()];
    
    const tr = document.createElement("tr");
    if(dateObj.getDay() === 0) tr.className = "sunday";
    if(dateObj.getDay() === 6) tr.className = "saturday";

    tr.innerHTML = `<td>${d}</td><td>${wday}</td>`;

    CELL_MAP.forEach(cell => {
      const td = document.createElement("td");
      td.className = "clickable";
      
      // 해당 날짜의 데이터 찾기 (이미 가공된 statusArray 사용)
      const dayData = data.find(r => r.date === dateStr);
      const record = dayData ? dayData.statusArray.find(s => s.period === cell.p && s.item === cell.i) : null;
      
      const status = record ? record.status : "";
      td.textContent = status === "완료" ? "●" : (status === "미완료" ? "○" : "");
      
      td.onclick = () => {
        const url = `https://foodtherapy-dean.github.io/my-webform/check/form_check.html?date=${dateStr}&period=${cell.p}&item=${cell.i}&status=${status || '미완료'}`;
        window.open(url, "_blank");
      };
      tr.appendChild(td);
    });
    tableBody.appendChild(tr);
  }
}

// 이벤트 리스너들
document.getElementById("prevMonth").onclick = () => {
  const d = new Date(monthInput.value + "-01");
  d.setMonth(d.getMonth() - 1);
  monthInput.value = d.toISOString().slice(0, 7);
  loadData();
};
document.getElementById("nextMonth").onclick = () => {
  const d = new Date(monthInput.value + "-01");
  d.setMonth(d.getMonth() + 1);
  monthInput.value = d.toISOString().slice(0, 7);
  loadData();
};
monthInput.onchange = loadData;

window.onload = () => {
  // 1. 주소창의 파라미터(URLSearchParams) 읽기
  const urlParams = new URLSearchParams(window.location.search);
  const paramDate = urlParams.get('date');
  const paramPeriod = urlParams.get('period');
  const paramItem = urlParams.get('item');
  const paramStatus = urlParams.get('status');

  // 2. 날짜 설정 (주소창에 날짜가 있으면 그 날짜로, 없으면 오늘로)
  if (paramDate) {
    dateInput.value = paramDate;
  } else {
    const now = new Date();
    dateInput.value = now.toISOString().split('T')[0];
  }

  // 3. 데이터 불러오기 (중복 체크 및 UI 업데이트)
  // 이 함수가 실행되면서 registeredData를 채우고 (✔) 표시를 합니다.
  fetchDailyStatus().then(() => {
    // 4. 주소창에 주기와 항목이 넘어왔다면 자동으로 선택하기
    if (paramPeriod) {
      periodSelect.value = paramPeriod;
      // 주기 선택 이벤트 강제 발생 (항목 리스트를 만들기 위함)
      periodSelect.dispatchEvent(new Event('change'));
      
      if (paramItem) {
        itemSelect.value = paramItem;
        // 항목 선택 이벤트 강제 발생 (상태 버튼과 삭제 가이드를 보이기 위함)
        itemSelect.dispatchEvent(new Event('change'));
        
        // 5. 상태값 반영
        if (paramStatus) {
          selectedStatus = paramStatus;
          updateStatusUI();
        }
      }
    }
  });
};
</script>
</body>
</html>
