<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>금속검출점검</title>
<style>
/* 스타일 유지 */
html, body { margin:0; padding:0; height:100%; font-family:sans-serif; }
.app-container { display:flex; flex-direction:column; height:100%; }
.app-header { flex:0 0 auto; background:#4CAF50; color:white; text-align:center; padding:16px; font-size:1.5rem; }
.app-body { flex:1 1 auto; overflow-y:auto; padding:16px; background:#f9f9f9; }
.app-footer { flex:0 0 auto; display: flex; }
button[type="submit"] { flex: 1; font-size: 1.4rem; padding: 18px 0; background: #28a745; color: white; border: none; cursor: pointer; }

.btn-delete { background: #dc3545; color: white; border: none; cursor: pointer; font-size: 1.1rem; width: 100%; padding: 12px; border-radius: 4px; margin-top: 10px; }
.btn-bulk { width: 100%; padding: 12px; background: #17a2b8; color: white; border: none; border-radius: 4px; margin-top: 10px; font-weight: bold; cursor: pointer; }

#loadingMsg { background: #007bff; color: white; padding: 20px; margin-top: 20px; text-align: center; border-radius: 8px; font-size: 1.2rem; display: none; }

label { display:block; margin-top:20px; font-weight:bold; }
input, select { width:100%; padding:12px; margin-top:6px; box-sizing:border-box; text-align:center; font-size:1.1rem; }
.ox-group { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
.ox-set { flex:1 1 48%; text-align:center; border:1px solid #ccc; border-radius:8px; padding:10px; }
.ox-buttons { display:flex; justify-content:center; gap:10px; margin-top:5px; }
.ox-buttons button { flex:1; padding:12px; font-size:1.1rem; background:#f0f0f0; border:1px solid #ccc; border-radius:4px; }
.ox-buttons button.selected { background:#007bff; color:white; }
.number-row { display:flex; gap:10px; }
.number-row > div { flex:1; }

.custom-select { position:relative; width:100%; margin-top:6px; text-align:center; }
.custom-select .selected-option { padding:12px; border:1px solid #ccc; background:#fff; cursor:pointer; }
.custom-select ul.options { position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid #ccc; margin:0; padding:0; list-style:none; display:none; z-index:1000; }
.custom-select.open ul.options { display:block; }
.custom-select ul.options li { padding:10px; cursor:pointer; border-bottom: 1px solid #eee; }
</style>
</head>
<body>
<div class="app-container">
  <div class="app-header">금속검출 점검</div>

  <form id="magnetForm" class="app-body">
    <label>날짜 <input type="date" id="date" name="date" /></label>
    
    <div id="loadingMsg">🔄 데이터 중복 확인 중...</div>

    <div id="mainContent" style="display:none;">
      <div id="deleteArea" style="display:none;">
        <button type="button" id="deleteBtnTop" class="btn-delete">🗑️ <span id="delDateText"></span> 데이터 일괄 삭제</button>
      </div>

      <button type="button" id="bulkBtn" class="btn-bulk">📅 이 날짜 데이터 일괄 생성 (구포국수1.4kg)</button>

      <label>점검 옵션</label>
      <div id="customOption" class="custom-select">
        <div class="selected-option">선택하세요</div>
        <ul class="options"></ul>
      </div>

      <div id="subInputs" style="display:none;">
        <label id="timeLabel">시간 <input type="time" id="time" name="time" /></label>
        <label>제품명
          <select id="product" name="product">
            <option value="">선택하세요</option>
            <option value="구포국수1.4kg">구포국수1.4kg</option>
            <option>한성국수900g</option>
            <option>잔치특면3kg</option>
            <option>치자국수1.4kg</option>
            <option>메밀국수1kg</option>
            <option>생칼국수1.8kg</option>
          </select>
        </label>
        <label>검출 상태</label>
        <div class="ox-group" id="oxContainer"></div>
      </div>

      <div id="summaryInputs" style="display:none;">
        <label>통과/검출 수량</label>
        <div class="number-row">
          <div><input type="number" id="passCount" name="passCount" placeholder="통과 수량" /></div>
          <div><input type="number" id="detectCount" name="detectCount" placeholder="검출 수량" /></div>
        </div>
      </div>
    </div>
  </form>

  <div class="app-footer">
    <button type="submit" form="magnetForm">저장</button>
  </div>
</div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbyXDgR9f1iXIu3mOTUR6TNGaH5xjLyFay1jCXjkrU0ictIwtf7NRiwbd6Vm4Gak6zJSnw/exec";

document.addEventListener("DOMContentLoaded", () => {
  const dateInput = document.getElementById("date");
  const mainContent = document.getElementById("mainContent");
  const loadingMsg = document.getElementById("loadingMsg");
  const customOption = document.getElementById("customOption");
  const selectedDiv = customOption.querySelector(".selected-option");
  const optionsList = customOption.querySelector(".options");
  const subInputs = document.getElementById("subInputs");
  const oxContainer = document.getElementById("oxContainer");
  const summaryInputs = document.getElementById("summaryInputs");
  const productInput = document.getElementById("product");
  const deleteArea = document.getElementById("deleteArea");
  const delDateText = document.getElementById("delDateText");
  const urlParams = new URLSearchParams(window.location.search);
  const paramDate = urlParams.get('date');
  const optionItems = ["작업전","1차점검","2차점검","작업후","최종취합"];
  let currentOption = "";
  let oxValues = {};
  if (paramDate) {
    dateInput.value = paramDate; // URL 날짜 적용
  } else {
    // URL 날짜가 없으면 오늘 날짜 적용 (기존 ISOString 방식 유지)
    dateInput.value = new Date().toISOString().split("T")[0];
  }

  let serverData = [];

  // 1. 서버 데이터 호출 (최초 로드 및 날짜 변경 시)
  async function updateOptionCompletion(dateVal) {
    const newUrl = `${window.location.pathname}?date=${dateVal}`;
    window.history.pushState({ path: newUrl }, '', newUrl);
    loadingMsg.style.display = "block";
    mainContent.style.display = "none"; 
    subInputs.style.display = "none";
    summaryInputs.style.display = "none";
    selectedDiv.textContent = "선택하세요";

    try {
      const res = await fetch(`${BASE_URL}?getMagnet=${encodeURIComponent(JSON.stringify({date:dateVal}))}`);
      const result = await res.json();
      
      serverData = result.data || []; // 전체 상세 데이터 저장
      const existingOptions = result.options || []; // 완료된 옵션명 배열
      
      // 옵션 리스트 생성
      optionsList.innerHTML = "";
      optionItems.forEach(opt => {
        const li = document.createElement("li");
        li.dataset.value = opt;
        li.textContent = existingOptions.includes(opt) ? `${opt} (완료)` : opt;
        optionsList.appendChild(li);
      });

      deleteArea.style.display = existingOptions.length > 0 ? "block" : "none";
      if(existingOptions.length > 0) delDateText.textContent = dateVal;

    } catch(e) {
      console.error("데이터 로드 실패:", e);
    } finally {
      loadingMsg.style.display = "none";
      mainContent.style.display = "block";
    }
  }

  // 항목 선택 시 데이터 채우기
  function handleOptionChange(opt) {
  subInputs.style.display = "block";
  const isBasic = ["작업전", "작업후"].includes(opt);
  const isCheck = ["1차점검", "2차점검"].includes(opt);
  const isFinal = opt === "최종취합";

  // UI 보임/숨김
  document.getElementById("timeLabel").style.display = isFinal ? "none" : "block";
  productInput.closest("label").style.display = isBasic ? "none" : "block";
  summaryInputs.style.display = isFinal ? "block" : "none";
  oxContainer.style.display = isFinal ? "none" : "block";

  // 폼 초기화
  document.getElementById("time").value = "";
  productInput.value = "";
  document.getElementById("passCount").value = "";
  document.getElementById("detectCount").value = "";
  oxValues = {};

  // serverData에서 선택한 옵션과 일치하는 데이터 찾기
  const existing = serverData.find(d => String(d.option).trim() === String(opt).trim());

  if (existing) {
    // 1. 시간 복원
    if (existing.hour !== "" && existing.hour !== undefined) {
      const hh = String(existing.hour).padStart(2, '0');
      const mm = String(existing.minute || "0").padStart(2, '0');
      document.getElementById("time").value = `${hh}:${mm}`;
    }
    
    // 2. 제품명 복원
    productInput.value = existing.product || "";

   // 3. 통과/검출 수량 복원 (초강력 디버깅 모드)
const passInput = document.getElementById("passCount");
const detectInput = document.getElementById("detectCount");

if (existing) {
  // 데이터 객체에서 'detect'가 포함된 키를 모두 뒤져서 값을 찾음
  // (대소문자나 미세한 이름 차이 해결)
  const realPass = existing.passCount ?? existing.pass ?? "";
  const realDetect = existing.detectCount ?? existing.detect ?? existing.detectcount ?? "";

  // 통과 수량 입력
  if (realPass !== "") {
    passInput.value = realPass;
  }

  // 검출 수량 입력 (핵심: 0이나 "0"을 절대 놓치지 않음)
  if (realDetect === 0 || realDetect === "0") {
    detectInput.value = 0;
  } else if (realDetect !== "") {
    detectInput.value = realDetect;
  }

  // [확인용] 만약 이래도 안 나오면 브라우저 콘솔(F12)을 보세요
  console.log(`[데이터확인] 옵션:${opt}, 가져온값:${realDetect}, 타입:${typeof realDetect}`);
}
    // 4. OX 상태 복원
    oxValues = existing.states || {};
  }
    // OX 버튼 생성 및 상태 복원
    let labels = isBasic ? ["Fe", "Sus"] : (isCheck ? ["Fe", "Sus", "제품", "제품+Fe", "제품+Sus"] : []);
    oxContainer.innerHTML = "";
    labels.forEach(label => {
      const div = document.createElement("div");
      div.className = "ox-set";
      const savedVal = String(oxValues[label] || "").toUpperCase(); // O 또는 X
      div.innerHTML = `<div>${label}</div><div class="ox-buttons">
        <button type="button" class="ox ${savedVal === 'O' ? 'selected' : ''}" data-label="${label}" data-value="O">O</button>
        <button type="button" class="ox ${savedVal === 'X' ? 'selected' : ''}" data-label="${label}" data-value="X">X</button>
      </div>`;
      oxContainer.appendChild(div);
    });
  }
  // 일괄 등록 버튼
  document.getElementById("bulkBtn").addEventListener("click", async () => {
    const dateVal = dateInput.value;
    if(!confirm(`${dateVal} 데이터를 일괄 생성하시겠습니까?`)) return;
    const btn = document.getElementById("bulkBtn");
    btn.disabled = true;
    btn.textContent = "🚀 등록 중...";
    const bulkData = [
      { opt: "작업전", time: "08:10", states: {Fe:"O", Sus:"O"}, prod: "" },
      { opt: "1차점검", time: "10:30", states: {Fe:"O", Sus:"O", "제품":"X", "제품+Fe":"O", "제품+Sus":"O"}, prod: "구포국수1.4kg" },
      { opt: "2차점검", time: "14:10", states: {Fe:"O", Sus:"O", "제품":"X", "제품+Fe":"O", "제품+Sus":"O"}, prod: "구포국수1.4kg" },
      { opt: "작업후", time: "16:40", states: {Fe:"O", Sus:"O"}, prod: "" },
      { opt: "최종취합", time: "", states: {}, prod: "구포국수1.4kg", pass: 1800 + (Math.floor(Math.random()*10)*30), detect: 0 }
    ];
    try {
      await fetch(BASE_URL, { method: "POST", body: new URLSearchParams({ magnet: JSON.stringify({ type: "bulk", date: dateVal, items: bulkData }) }) });
      alert("완료!");
      resetForm(document.getElementById("magnetForm"), dateVal);
    } catch (e) { alert("실패"); } finally { btn.disabled = false; btn.textContent = "📅 이 날짜 데이터 일괄 생성"; }
  });

  // 일괄 삭제 버튼
  document.getElementById("deleteBtnTop").addEventListener("click", async () => {
    const dateVal = dateInput.value;
    if(!confirm(`${dateVal}의 모든 데이터를 삭제하시겠습니까?`)) return;
    await fetch(BASE_URL, { method: "POST", body: new URLSearchParams({ magnet: JSON.stringify({ type: "delete", date: dateVal }) }) });
    alert("삭제되었습니다.");
    resetForm(document.getElementById("magnetForm"), dateVal);
  });

  // 옵션 선택 클릭 이벤트
  customOption.addEventListener("click", e => {
    if (e.target.classList.contains("selected-option")) customOption.classList.toggle("open");
    if (e.target.tagName === "LI") {
      currentOption = e.target.dataset.value;
      selectedDiv.textContent = e.target.textContent;
      customOption.classList.remove("open");
      handleOptionChange(currentOption);
    }
  });

  // OX 버튼 클릭 이벤트
  document.addEventListener("click", e => {
    if(e.target.classList.contains("ox")) {
      const { label, value } = e.target.dataset;
      oxValues[label] = value;
      e.target.parentElement.querySelectorAll(".ox").forEach(b => b.classList.toggle("selected", b === e.target));
    }
  });

  // 저장
  document.getElementById("magnetForm").addEventListener("submit", async e => {
    e.preventDefault();
    const form = e.target;
    let [h, m] = form.time.value ? form.time.value.split(":") : ["", ""];
    const data = {
      type: "data", date: form.date.value, option: currentOption,
      hour: h, minute: m, product: productInput.value, states: oxValues,
      passCount: form.passCount.value, detectCount: form.detectCount.value
    };
    await fetch(BASE_URL, { method: "POST", body: new URLSearchParams({ magnet: JSON.stringify(data) })});
    alert("저장되었습니다.");
    resetForm(form, form.date.value);
  });

  function resetForm(form, keepDate) {
    form.reset();
    dateInput.value = keepDate;
    updateOptionCompletion(keepDate);
  }

  dateInput.addEventListener("change", () => updateOptionCompletion(dateInput.value));
  updateOptionCompletion(dateInput.value);
});
</script>
</body>
</html>
