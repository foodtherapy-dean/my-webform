<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Input 데이터입력</title>
<style>
body, html { margin:0; padding:0; font-family:sans-serif; height:100%; }
.app-container { display:flex; flex-direction:column; height:100%; }
.app-header { background:#3f51b5; color:#fff; text-align:center; padding:16px; font-size:1.6rem; }
.app-body { flex:1 1 auto; overflow-y:auto; padding:20px; background:#f9f9f9; }
.app-footer { flex:0 0 auto; display: flex; }
button { cursor:pointer; border:none; border-radius:6px; }

label { display:block; margin-top:16px; margin-bottom:6px; font-weight:bold; }
input, select { width:100%; padding:12px 14px; font-size:1.1rem; border:1px solid #ccc; border-radius:6px; box-sizing: border-box; }

/* 상단 입고 현황 요약 */
.status-container { margin-top: 5px; padding: 10px; background: #e3f2fd; border-radius: 8px; border: 1px solid #bbdefb; }
.status-title { font-size: 0.9rem; color: #1976d2; font-weight: bold; margin-bottom: 5px; }
#ingpList { color: #1976d2; font-weight: bold; font-size: 1rem; word-break: break-all; }

#loadingMsg { background: #3f51b5; color: white; padding: 20px; margin-top: 20px; text-align: center; border-radius: 8px; display: none; }

/* 삭제 영역 (중복 시 노출) */
#deleteArea { display: none; margin-top: 15px; background: #fff; padding: 15px; border: 2px solid #dc3545; border-radius: 8px; }
.btn-delete { background: #dc3545; color: white; width: 100%; padding: 12px; font-size: 1.1rem; border-radius: 6px; font-weight: bold; }
.del-msg { color: #dc3545; font-size: 1rem; margin-bottom: 10px; text-align: center; font-weight: bold; }

.option-row { display:flex; align-items:center; margin-bottom:12px; }
.option-label { width:120px; font-weight:normal; }
.option-buttons { flex:1; display:flex; justify-content:space-between; gap: 10px; }
.option-buttons button { flex: 1; padding:12px 0; font-size:1.1rem; border:1px solid #ccc; border-radius:6px; background: #fff; }
.option-buttons button.selected { background:#3f51b5; color:#fff; border-color: #3f51b5; }

#submitBtn { flex: 1; font-size:1.4rem; padding:20px 0; background:#3f51b5; color:#fff; border-radius:0; }
</style>
</head>
<body>
<div class="app-container">
  <div class="app-header">📋 입고검수</div>
  
  <div class="app-body">
    <label for="date">날짜</label>
    <input type="date" id="date" />

    <div class="status-container">
      <div class="status-title">📍 오늘 입고된 제품 리스트:</div>
      <div id="ingpList">데이터 확인 중...</div>
    </div>

    <div id="loadingMsg">🔄 서버 통신 중...</div>

    <div id="mainContent">
      <div id="deleteArea">
        <div class="del-msg">⚠️ [<span id="delProdName"></span>] 이미 입고된 항목입니다.</div>
        <button type="button" id="deleteBtn" class="btn-delete">기존 기록 삭제하기</button>
      </div>

      <label for="product">제품명 선택</label>
      <select id="product">
        <option value="">선택하세요</option>
        <option value="밀가루">밀가루</option>
        <option value="소금">소금</option>
        <option value="치자가루">치자가루</option>
        <option value="메밀가루">메밀가루</option>
      </select>

      <div id="detailInputs" style="display:none;">
        <label for="count">수량</label>
        <input type="number" id="count" min="0" placeholder="수량을 입력하세요" />

        <div id="optionsContainer" style="margin-top:16px;">
          <div class="option-row"><div class="option-label">차량상태</div><div class="option-buttons"><button type="button">O</button><button type="button">X</button></div></div>
          <div class="option-row"><div class="option-label">파레트상태</div><div class="option-buttons"><button type="button">O</button><button type="button">X</button></div></div>
          <div class="option-row"><div class="option-label">외포장상태</div><div class="option-buttons"><button type="button">O</button><button type="button">X</button></div></div>
          <div class="option-row"><div class="option-label">표시기준</div><div class="option-buttons"><button type="button">O</button><button type="button">X</button></div></div>
          <div class="option-row"><div class="option-label">성적서구비</div><div class="option-buttons"><button type="button">O</button><button type="button">X</button></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="app-footer">
    <button id="submitBtn">💾 저장하기</button>
  </div>
</div>

<script>
const scriptUrl = "https://script.google.com/macros/s/AKfycbyXDgR9f1iXIu3mOTUR6TNGaH5xjLyFay1jCXjkrU0ictIwtf7NRiwbd6Vm4Gak6zJSnw/exec";

document.addEventListener("DOMContentLoaded", () => {
  const dateInput = document.getElementById("date");
  const productSelect = document.getElementById("product");
  const countInput = document.getElementById("count");
  const optionsContainer = document.getElementById("optionsContainer");
  const ingpList = document.getElementById("ingpList");
  const detailInputs = document.getElementById("detailInputs");
  const loadingMsg = document.getElementById("loadingMsg");
  const deleteArea = document.getElementById("deleteArea");
  const delProdName = document.getElementById("delProdName");
  const deleteBtn = document.getElementById("deleteBtn");
  const submitBtn = document.getElementById("submitBtn");

  let serverData = [];

  dateInput.valueAsDate = new Date();

  // 1. 해당 날짜의 전체 데이터 로드 및 UI 업데이트
  async function loadDailyStatus() {
    loadingMsg.style.display = "block";
    ingpList.textContent = "확인 중...";
    deleteArea.style.display = "none";
    detailInputs.style.display = "none";
    productSelect.value = "";

    try {
      const res = await fetch(`${scriptUrl}?getDailyInput=true&date=${dateInput.value}`);
      const result = await res.json();
      serverData = result.data || [];
      
      // 상단 파란색 리스트 표시
      if (serverData.length > 0) {
        ingpList.textContent = serverData.map(d => d.product).join(", ");
      } else {
        ingpList.textContent = "없음 (모두 미입고)";
      }

      // 셀렉트 박스 (입고) 텍스트 업데이트
      const options = productSelect.querySelectorAll("option");
      options.forEach(opt => {
        if (opt.value === "") return;
        const cleanName = opt.value.replace(" (입고)", "");
        const isExist = serverData.some(d => d.product.trim() === cleanName.trim());
        opt.textContent = isExist ? `${cleanName} (입고)` : cleanName;
        // 실제 value값은 정제된 이름으로 유지 (매칭용)
        opt.value = cleanName; 
      });

    } catch(e) {
      ingpList.textContent = "로드 실패";
    } finally {
      loadingMsg.style.display = "none";
    }
  }

  // 2. 제품 선택 시 동작
  productSelect.addEventListener("change", () => {
    const selectedProd = productSelect.value;
    if (!selectedProd) {
      detailInputs.style.display = "none";
      deleteArea.style.display = "none";
      return;
    }

    const existing = serverData.find(d => d.product.trim() === selectedProd.trim());
    detailInputs.style.display = "block";
    
    // 초기화
    countInput.value = "";
    optionsContainer.querySelectorAll("button").forEach(b => b.classList.remove("selected"));

    if (existing) {
      // 데이터 복원
      countInput.value = existing.count || "";
      const states = [existing.A, existing.B, existing.C, existing.D, existing.E];
      states.forEach((val, i) => {
        const btns = optionsContainer.querySelectorAll(`.option-row:nth-child(${i+1}) .option-buttons button`);
        btns.forEach(b => { if (b.textContent === val) b.classList.add("selected"); });
      });

      // 삭제 안내창 노출
      delProdName.textContent = selectedProd;
      deleteArea.style.display = "block";
    } else {
      deleteArea.style.display = "none";
    }
  });

  // O/X 버튼 클릭
  optionsContainer.addEventListener("click", (e) => {
    if (e.target.tagName === "BUTTON") {
      const group = e.target.closest(".option-buttons");
      group.querySelectorAll("button").forEach(b => b.classList.remove("selected"));
      e.target.classList.add("selected");
    }
  });

  // 3. 삭제 실행
  deleteBtn.addEventListener("click", async () => {
    const prod = productSelect.value;
    if(!confirm(`[${prod}] 기록을 삭제하시겠습니까?\n삭제 후 다시 입력할 수 있습니다.`)) return;
    
    try {
      loadingMsg.style.display = "block";
      await fetch(scriptUrl, {
        method: "POST",
        body: new URLSearchParams({ type: "deleteInput", date: dateInput.value, product: prod })
      });
      alert("삭제되었습니다.");
      loadDailyStatus();
    } catch(e) { alert("삭제 실패"); }
  });

  // 4. 저장 실행 (덮어쓰기 포함)
  submitBtn.addEventListener("click", async () => {
    if (!productSelect.value) return alert("제품을 선택하세요.");
    const selectedOptions = optionsContainer.querySelectorAll("button.selected");
    if (selectedOptions.length < 5) return alert("모든 점검 항목을 선택해주세요.");

    const payload = {
      date: dateInput.value,
      product: productSelect.value,
      count: countInput.value,
      A: optionsContainer.querySelector('.option-row:nth-child(1) .option-buttons button.selected').textContent,
      B: optionsContainer.querySelector('.option-row:nth-child(2) .option-buttons button.selected').textContent,
      C: optionsContainer.querySelector('.option-row:nth-child(3) .option-buttons button.selected').textContent,
      D: optionsContainer.querySelector('.option-row:nth-child(4) .option-buttons button.selected').textContent,
      E: optionsContainer.querySelector('.option-row:nth-child(5) .option-buttons button.selected').textContent
    };

    try {
      submitBtn.disabled = true;
      submitBtn.textContent = "⏳ 저장 중...";
      await fetch(scriptUrl, {
        method: "POST",
        body: new URLSearchParams({ input: JSON.stringify(payload) })
      });
      alert("저장/업데이트 완료!");
      loadDailyStatus();
    } catch(err){ alert("저장 실패"); }
    finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "💾 저장하기";
    }
  });

  dateInput.addEventListener("change", loadDailyStatus);
  loadDailyStatus();
});
</script>
</body>
</html>
