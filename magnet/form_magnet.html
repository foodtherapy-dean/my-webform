<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>금속검출점검</title>
<style>
/* 기존 스타일 유지 및 버튼 스타일 추가 */
html, body { margin:0; padding:0; height:100%; font-family:sans-serif; }
.app-container { display:flex; flex-direction:column; height:100%; }
.app-header { flex:0 0 auto; background:#4CAF50; color:white; text-align:center; padding:16px; font-size:1.5rem; }
.app-body { flex:1 1 auto; overflow-y:auto; padding:16px; background:#f9f9f9; }
.app-footer { flex:0 0 auto; display: flex; }
button[type="submit"] { flex: 2; font-size: 1.4rem; padding: 18px 0; background: #28a745; color: white; border: none; cursor: pointer; }
.btn-delete { flex: 1; background: #dc3545; color: white; border: none; cursor: pointer; font-size: 1.1rem; }
.btn-bulk { width: 100%; padding: 12px; background: #17a2b8; color: white; border: none; border-radius: 4px; margin-top: 10px; font-weight: bold; cursor: pointer; }
label { display:block; margin-top:20px; font-weight:bold; }
input, select { width:100%; padding:12px; margin-top:6px; box-sizing:border-box; text-align:center; font-size:1.1rem; }
.ox-group { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
.ox-set { flex:1 1 48%; text-align:center; border:1px solid #ccc; border-radius:8px; padding:10px; }
.ox-buttons { display:flex; justify-content:center; gap:10px; margin-top:5px; }
.ox-buttons button { flex:1; padding:12px; font-size:1.1rem; background:#f0f0f0; border:1px solid #ccc; border-radius:4px; }
.ox-buttons button.selected { background:#007bff; color:white; }
.number-row { display:flex; gap:10px; }
.number-row > div { flex:1; }
.custom-select { position:relative; width:100%; margin-top:6px; text-align:center; }
.custom-select .selected-option { padding:12px; border:1px solid #ccc; background:#fff; cursor:pointer; }
.custom-select ul.options { position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid #ccc; margin:0; padding:0; list-style:none; display:none; z-index:1000; }
.custom-select.open ul.options { display:block; }
.custom-select ul.options li { padding:10px; cursor:pointer; border-bottom: 1px solid #eee; }
</style>
</head>
<body>
<div class="app-container">
  <div class="app-header">금속검출 점검</div>

  <form id="magnetForm" class="app-body">
    <label>날짜 <input type="date" id="date" name="date" /></label>
    
    <button type="button" id="bulkBtn" class="btn-bulk">📅 이 날짜 데이터 일괄 생성</button>

    <label>점검 옵션</label>
    <div id="customOption" class="custom-select">
      <div class="selected-option">선택하세요</div>
      <ul class="options"></ul>
    </div>

    <div id="subInputs" style="display:none;">
      <label id="timeLabel">시간 <input type="time" id="time" name="time" /></label>
      <label>제품명
        <select id="product" name="product">
          <option value="">선택하세요</option>
          <option>구포국수1.4kg</option>
          <option>한성국수900g</option>
          <option>잔치특면3kg</option>
          <option>치자국수1.4kg</option>
          <option>메밀국수1kg</option>
          <option>생칼국수1.8kg</option>
        </select>
      </label>
      <label>검출 상태</label>
      <div class="ox-group" id="oxContainer"></div>
    </div>

    <div id="summaryInputs" style="display:none;">
      <label>통과/검출 수량</label>
      <div class="number-row">
        <div><input type="number" name="passCount" placeholder="통과 수량" /></div>
        <div><input type="number" name="detectCount" placeholder="검출 수량" /></div>
      </div>
    </div>
  </form>

  <div class="app-footer">
    <button type="button" id="deleteBtn" class="btn-delete">삭제</button>
    <button type="submit" form="magnetForm">저장</button>
  </div>
</div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbzBomaVEDZsJhph0ipgQE0gm8N0Y_LvbYG5XWHzWCqvLFPtEVLI-mMgfHr3FpdO20E99w/exec";

document.addEventListener("DOMContentLoaded", () => {
  const dateInput = document.getElementById("date");
  const customOption = document.getElementById("customOption");
  const selectedDiv = customOption.querySelector(".selected-option");
  const optionsList = customOption.querySelector(".options");
  const subInputs = document.getElementById("subInputs");
  const oxContainer = document.getElementById("oxContainer");
  const summaryInputs = document.getElementById("summaryInputs");
  const productInput = document.getElementById("product");
  
  const optionItems = ["작업전","1차점검","2차점검","작업후","최종취합"];
  let currentOption = "";
  let oxValues = {};

  // 초기 날짜 설정
  dateInput.value = new Date().toISOString().split("T")[0];

  // 옵션 렌더링 함수
  function renderOptions(existing=[]) {
    optionsList.innerHTML = "";
    optionItems.forEach(opt => {
      const li = document.createElement("li");
      li.dataset.value = opt;
      li.textContent = existing.includes(opt) ? `${opt} (완료)` : opt;
      optionsList.appendChild(li);
    });
  }

  // 랜덤 시간 생성 (10분 단위)
  function getRandomTime(startHour, endHour, startMin=0, endMin=50) {
    const h = Math.floor(Math.random() * (endHour - startHour + 1)) + startHour;
    const m = Math.floor(Math.random() * 6) * 10; // 0, 10, 20, 30, 40, 50
    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
  }

  // 일괄 등록 버튼 로직
  document.getElementById("bulkBtn").addEventListener("click", async () => {
    // 사용자 선택 없이 '구포국수1.4kg' 고정
    const defaultProduct = "구포국수1.4kg"; 
    
    if(!confirm(`${dateInput.value} 전체 데이터를 ['${defaultProduct}'] 기준으로 자동 생성하시겠습니까?`)) return;

    const bulkData = [
      { opt: "작업전", time: getRandomTime(8, 8, 0, 30), states: {Fe:"O", Sus:"O"}, prod: "" },
      { opt: "1차점검", time: getRandomTime(10, 11), states: {Fe:"O", Sus:"O", "제품":"X", "제품+Fe":"O", "제품+Sus":"O"}, prod: defaultProduct },
      { opt: "2차점검", time: getRandomTime(13, 14), states: {Fe:"O", Sus:"O", "제품":"X", "제품+Fe":"O", "제품+Sus":"O"}, prod: defaultProduct },
      { opt: "작업후", time: getRandomTime(15, 16, 40, 30), states: {Fe:"O", Sus:"O"}, prod: "" },
      { opt: "최종취합", time: "", states: {}, prod: defaultProduct, pass: (Math.floor(Math.random() * 11) * 30 + 1800), detect: 0 }
    ];

    // 중로딩 표시나 버튼 비활성화 권장
    const btn = document.getElementById("bulkBtn");
    btn.disabled = true;
    btn.textContent = "등록 중...";

    try {
      for(const item of bulkData) {
        const [h, m] = item.time ? item.time.split(":") : ["", ""];
        const payload = {
          type: "data", 
          date: dateInput.value, 
          option: item.opt,
          hour: h, 
          minute: m, 
          product: item.prod, 
          states: item.states,
          passCount: item.pass, 
          detectCount: item.detect
        };
        
        // POST 요청
        await fetch(BASE_URL, { 
          method: "POST", 
          body: new URLSearchParams({ magnet: JSON.stringify(payload) })
        });
      }
      alert("일괄 등록 완료!");
    } catch (e) {
      alert("등록 중 오류가 발생했습니다.");
    } finally {
      btn.disabled = false;
      btn.textContent = "📅 이 날짜 데이터 일괄 생성";
      updateOptionCompletion(dateInput.value);
    }
  });

  // 삭제 버튼 로직
  document.getElementById("deleteBtn").addEventListener("click", async () => {
    if(!confirm(`${dateInput.value}의 모든 데이터를 삭제하시겠습니까?`)) return;
    try {
      const res = await fetch(BASE_URL, {
        method: "POST",
        body: new URLSearchParams({ magnet: JSON.stringify({ type: "delete", date: dateInput.value }) })
      });
      alert("삭제되었습니다.");
      resetForm(document.getElementById("magnetForm"), dateInput.value);
    } catch(e) { alert("삭제 실패"); }
  });

  // 옵션 선택 처리
  customOption.addEventListener("click", e => {
    if (e.target.classList.contains("selected-option")) customOption.classList.toggle("open");
    if (e.target.tagName === "LI") {
      currentOption = e.target.dataset.value;
      selectedDiv.textContent = e.target.textContent;
      customOption.classList.remove("open");
      handleOptionChange(currentOption);
    }
  });

  async function handleOptionChange(opt) {
    subInputs.style.display="block";
    const isBasic = ["작업전", "작업후"].includes(opt);
    const isCheck = ["1차점검", "2차점검"].includes(opt);
    const isFinal = opt === "최종취합";

    document.getElementById("timeLabel").style.display = isFinal ? "none" : "block";
    productInput.closest("label").style.display = isBasic ? "none" : "block";
    summaryInputs.style.display = isFinal ? "block" : "none";
    oxContainer.style.display = isFinal ? "none" : "block";

    let labels = isBasic ? ["Fe", "Sus"] : (isCheck ? ["Fe", "Sus", "제품", "제품+Fe", "제품+Sus"] : []);
    oxContainer.innerHTML = "";
    oxValues = {};
    labels.forEach(label => {
      const div = document.createElement("div");
      div.className = "ox-set";
      div.innerHTML = `<div>${label}</div><div class="ox-buttons">
        <button type="button" class="ox" data-label="${label}" data-value="O">O</button>
        <button type="button" class="ox" data-label="${label}" data-value="X">X</button>
      </div>`;
      oxContainer.appendChild(div);
    });
  }

  // OX 버튼 클릭 이벤트 전위
  document.addEventListener("click", e => {
    if(e.target.classList.contains("ox")) {
      const { label, value } = e.target.dataset;
      oxValues[label] = value;
      e.target.parentElement.querySelectorAll(".ox").forEach(b => b.classList.toggle("selected", b === e.target));
    }
  });

  // 저장 제출
  document.getElementById("magnetForm").addEventListener("submit", async e => {
    e.preventDefault();
    const form = e.target;
    let [h, m] = form.time.value ? form.time.value.split(":") : ["", ""];
    const data = {
      type: "data", date: form.date.value, option: currentOption,
      hour: h, minute: m, product: productInput.value, states: oxValues,
      passCount: form.passCount.value, detectCount: form.detectCount.value
    };
    const res = await fetch(BASE_URL, { method: "POST", body: new URLSearchParams({ magnet: JSON.stringify(data) })});
    alert("저장되었습니다.");
    resetForm(form, form.date.value);
  });

  async function updateOptionCompletion(dateVal) {
    const res = await fetch(`${BASE_URL}?getMagnet=${encodeURIComponent(JSON.stringify({date:dateVal}))}`);
    const data = await res.json();
    renderOptions(data.options || []);
  }

  function resetForm(form, keepDate) {
    form.reset();
    dateInput.value = keepDate;
    subInputs.style.display = "none";
    summaryInputs.style.display = "none";
    selectedDiv.textContent = "선택하세요";
    updateOptionCompletion(keepDate);
  }

  dateInput.addEventListener("change", () => updateOptionCompletion(dateInput.value));
  updateOptionCompletion(dateInput.value);
});
</script>
</body>
</html>
