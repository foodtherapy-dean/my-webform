<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>위생 점검</title>
<link rel="icon" type="image/png" sizes="192x192" href="handwash.png">
<link rel="apple-touch-icon" href="handwash.png">
<meta name="theme-color" content="#4CAF50">
<link rel="manifest" href="manifest.json">
<style>
html, body { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
.app-container { display: flex; flex-direction: column; height: 100%; }
.app-header { flex: 0 0 auto; background-color: #4CAF50; color: white; text-align: center; padding: 16px; font-size: 1.5rem; }
.app-body { flex: 1 1 auto; overflow-y: auto; padding: 16px; box-sizing: border-box; background-color: #f9f9f9; }
.app-footer { flex: 0 0 auto; }

/* 버튼 스타일 */
button { cursor: pointer; border-radius: 4px; border: none; }
button[type="submit"] { width: 100%; font-size: 1.4rem; padding: 18px 0; background-color: #28a745; color: white; border-radius: 0; }
#bulkOkBtn { width: 100%; background-color: #e91e63; color: white; padding: 15px; font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

label { display: block; margin-top: 15px; font-weight: bold; color: #333; }
input, select { width: 100%; padding: 12px; margin-top: 6px; box-sizing: border-box; text-align: center; font-size: 1.1rem; border: 1px solid #ccc; border-radius: 6px; }

.ox-group { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
.ox-set { text-align: center; border: 1px solid #ccc; border-radius: 8px; padding: 10px; background: white; }
.ox-buttons { display: flex; justify-content: center; gap: 10px; margin-top: 5px; }
.ox-buttons button { flex: 1; padding: 12px; font-size: 1.1rem; background-color: #f0f0f0; border: 1px solid #ccc; color: #333; }
.ox-buttons button.selected { background-color: #007bff; color: white; border-color: #0056b3; }

#loadingMsg { background-color: #007bff; color: white; padding: 10px; margin-top: 10px; text-align: center; border-radius: 4px; display: none; }
#duplicateMsg { background-color: #ffc107; color: #333; padding: 10px; margin-top: 12px; text-align: center; border-radius: 4px; display: none; font-weight: bold; }
#duplicateMsg button { margin-top: 10px; padding: 8px 16px; background: #333; color: #fff; }
</style>
</head>

<body>
<div class="app-container">
  <div class="app-header">위생 점검 시스템</div>

  <div class="app-body">
    <label>점검 날짜
      <input type="date" id="date" name="date" />
    </label>

    <button type="button" id="bulkOkBtn">🚀 전 공정 일괄 [O] 등록</button>
<div id="bulkDeleteSection" style="display:none; margin-bottom: 20px; padding: 15px; background-color: #fff5f5; border: 1px solid #feb2b2; border-radius: 8px; text-align: center;">
  <span style="color: #c53030; font-weight: bold; font-size: 1rem;">⚠️ 해당 날짜에 등록된 데이터가 있습니다.</span><br>
  <button type="button" id="bulkDeleteBtn" style="margin-top: 10px; width: 100%; padding: 12px; background-color: #e53e3e; color: white; font-weight: bold; border-radius: 6px;">
    📅 해당 날짜 전체 데이터 삭제
  </button>
</div>
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
<div id="duplicateMsg" style="display:none; background-color: #e3f2fd; padding: 12px; border-radius: 6px; margin-top: 10px; text-align: center;">
  <span id="duplicateText" style="color: #0d47a1; font-weight: bold;"></span><br>
  <button type="button" id="duplicateConfirmBtn" style="margin-top: 8px; background: #007bff; color: white; padding: 8px 15px;">수정하기(잠금해제)</button>
</div>
    <form id="inspectForm">
      <label>개별 점검 옵션 선택
        <select id="option" name="option" required>
          <option value="">데이터 로딩 중...</option>
        </select>
      </label>

      <div id="loadingMsg">데이터 확인 중...</div>

      <div id="duplicateMsg" style="display:none; background-color: #fff3cd; padding: 15px; border: 1px solid #ffeeba;">
  <span id="duplicateText" style="color: #856404; font-weight: bold;"></span><br>
  <div style="display: flex; gap: 10px; margin-top: 10px;">
    <button type="button" id="duplicateConfirmBtn" style="flex:1; background:#6c757d; color:white;">수정하기</button>
    <button type="button" id="deleteBtn" style="flex:1; background:#dc3545; color:white; font-weight:bold;">데이터 삭제</button>
  </div>
</div>

      <div id="oxContainer" class="ox-group"></div>
    </form>
  </div>

  <div class="app-footer">
    <button type="submit" form="inspectForm">선택 항목 저장</button>
  </div>
</div>

<script>
window.addEventListener("DOMContentLoaded", async function () {
  const dateInput = document.getElementById("date");
  const optionSelect = document.getElementById("option");
  const oxContainer = document.getElementById("oxContainer");
  const bulkOkBtn = document.getElementById("bulkOkBtn");
  const bulkDeleteSection = document.getElementById("bulkDeleteSection");
  const bulkDeleteBtn = document.getElementById("bulkDeleteBtn");
  const duplicateMsg = document.getElementById("duplicateMsg");
  const duplicateText = document.getElementById("duplicateText");
  const loadingMsg = document.getElementById("loadingMsg");

  const GAS_URL = "https://script.google.com/macros/s/AKfycby9tBMpSaX87nOCykFVAsJINIkqncA1LRGzpY8r7Ngg6ncJvWzRqi44jifwOFZeb0Ns6A/exec";
  
  let oxValues = {};

  const itemsMap = {
    "작업전": ["개인위생 - 복장구분 보관여부", "개인위생 - 건강/장신구/위생복 착용여부", "개인위생 - 위생설비 이상/위생처리", "방충방서 - 밀폐상태/방충시설", "설비 - 파손,고장 설비유무", "보관 - 보관소 정리정돈 상태"],
    "작업중": ["공정관리 - 구역분리 및 오염관리", "공정관리 - 완제품 포장상태", "공정관리 - 반제품 적재기준", "공정관리 - 포장라인 위해요소 여부"],
    "작업후": ["방충방서 - 생산부산물 별도구획 보관 및 반출", "청소소독 - 작업장/설비/위생시설", "설비 - 파손/고장 설비 유무", "점검 - CCP점검 상태/개선조치 여부", "보관 - 원부재료 오염방지 보관여부"],
    "수시점검": ["입고검수 - 원부재료 입고검수 준수여부"]
  };

  const paramDate = new URLSearchParams(location.search).get("date");
  if (paramDate) dateInput.value = paramDate;
  else dateInput.valueAsDate = new Date();

  // [개선] 날짜별 상태 로드 최적화
  async function loadOptionStatus() {
  if (!dateInput.value) return;
  
  // 로딩 시작 시 사용자에게 시각적 피드백 제공
  optionSelect.innerHTML = `<option value="">데이터 확인 중...</option>`;
  // 로딩 중에는 버튼들이 보이지 않도록 다시 한번 보장 (안전장치)
    bulkDeleteSection.style.display = "none";
    bulkOkBtn.style.display = "none";
  try {
    const allOptions = Object.keys(itemsMap);
    const query = encodeURIComponent(JSON.stringify({ date: dateInput.value, allOptions }));
    
    // 캐시 방지를 위해 타임스탬프 추가 (선택사항)
    const res = await fetch(`${GAS_URL}?checkAllWash=${query}&t=${Date.now()}`);
    const result = await res.json();

    optionSelect.innerHTML = `<option value="">점검 단계 선택</option>`;
    let hasAnyData = false;

    allOptions.forEach(name => {
      const opt = document.createElement("option");
      opt.value = name;
      if (result[name]) {
        opt.textContent = `${name} (완료)`;
        hasAnyData = true;
      } else {
        opt.textContent = name;
      }
      optionSelect.appendChild(opt);
    });

    bulkDeleteSection.style.display = hasAnyData ? "block" : "none";
    bulkOkBtn.style.display = hasAnyData ? "none" : "block";

  } catch (err) { 
    console.error("로딩 에러:", err);
    optionSelect.innerHTML = `<option value="">로딩 실패 (재시도 필요)</option>`;
  }
}

  dateInput.addEventListener("change", async () => {
    optionSelect.value = "";
    oxContainer.innerHTML = "";
    duplicateMsg.style.display = "none";
    bulkDeleteSection.style.display = "none"; // 날짜 바꾸자마자 삭제 섹션 즉시 숨김
    bulkOkBtn.style.display = "none";        // 등록 버튼도 일단 숨김 (로딩 후 판단)
    await loadOptionStatus();
  });

  optionSelect.addEventListener("change", async (e) => {
    const opt = e.target.value;
    oxContainer.innerHTML = "";
    oxValues = {};
    if (!opt) return;

    duplicateMsg.style.display = "none";
    loadingMsg.style.display = "block";

    try {
      const query = encodeURIComponent(JSON.stringify({ date: dateInput.value, option: opt }));
      const res = await fetch(`${GAS_URL}?checkWash=${query}`);
      const result = await res.json();
      loadingMsg.style.display = "none";

      let existingValues = result.exists ? result.values : null;
      if (result.exists) {
        duplicateText.innerText = `ℹ️ [${opt}] 단계 데이터가 존재합니다. 수정 가능합니다.`;
        duplicateMsg.style.display = "block";
      }

      itemsMap[opt].forEach((label, i) => {
        const saved = (existingValues && existingValues[i]) ? existingValues[i] : "";
        oxValues[label] = saved;
        const oxSet = document.createElement("div");
        oxSet.className = "ox-set";
        oxSet.innerHTML = `
          <div style="font-size:0.95rem; margin-bottom:8px;">${label}</div>
          <div class="ox-buttons">
            <button type="button" class="ox ${saved === "O" ? "selected" : ""}" data-label="${label}" data-value="O">O</button>
            <button type="button" class="ox ${saved === "X" ? "selected" : ""}" data-label="${label}" data-value="X">X</button>
          </div>
        `;
        oxContainer.appendChild(oxSet);
      });
    } catch (err) { loadingMsg.style.display = "none"; }
  });

  document.addEventListener("click", (e) => {
    if (e.target.classList.contains("ox")) {
      const btn = e.target;
      const label = btn.dataset.label;
      oxValues[label] = btn.dataset.value;
      document.querySelectorAll(`.ox[data-label="${label}"]`).forEach(b => b.classList.toggle("selected", b === btn));
    }
  });

  // ⭐ [초고속 개선] 일괄 등록: 한 번의 통신으로 묶어 보내기
  bulkOkBtn.addEventListener("click", async () => {
    if (!confirm(`${dateInput.value} 날짜의 모든 항목을 'O'로 일괄 등록하시겠습니까?`)) return;

    bulkOkBtn.disabled = true;
    bulkOkBtn.innerText = "⏳ 초고속 등록 중...";

    try {
      const allOptions = Object.keys(itemsMap);
      const batchData = allOptions.map(opt => ({
        date: dateInput.value,
        option: opt,
        states: itemsMap[opt].map(() => "O")
      }));

      const fd = new FormData();
      fd.append("bulkInspect", JSON.stringify(batchData)); 
      
      const response = await fetch(GAS_URL, { method: "POST", body: fd });
      alert(await response.text());
      location.reload();
    } catch (err) {
      alert("오류: " + err.message);
      bulkOkBtn.disabled = false;
      bulkOkBtn.innerText = "🚀 전 공정 일괄 [O] 등록";
    }
  });

  bulkDeleteBtn.addEventListener("click", async () => {
    const dt = dateInput.value;
    if (!confirm(`⚠️ [${dt}] 날짜의 모든 위생 점검 데이터를 삭제하시겠습니까?`)) return;

    bulkDeleteBtn.disabled = true;
    bulkDeleteBtn.innerText = "⏳ 전체 삭제 중...";

    try {
      const fd = new FormData();
      fd.append("deleteAllWash", JSON.stringify({ date: dt }));
      const res = await fetch(GAS_URL, { method: "POST", body: fd });
      alert(await res.text());
      location.reload();
    } catch (err) {
      alert("삭제 실패: " + err.message);
      bulkDeleteBtn.disabled = false;
      bulkDeleteBtn.innerText = "📅 해당 날짜 전체 데이터 삭제";
    }
  });

  document.getElementById("inspectForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const opt = optionSelect.value;
    if (!opt) return alert("옵션을 선택하세요.");

    const states = itemsMap[opt].map(lbl => oxValues[lbl]);
    if (states.includes("")) return alert("모든 항목을 선택해주세요.");

    const data = { date: dateInput.value, option: opt, states: states };
    const fd = new FormData();
    fd.append("inspect", JSON.stringify(data));

    try {
      const response = await fetch(GAS_URL, { method: "POST", body: fd });
      alert(await response.text());
      location.reload();
    } catch (err) { alert("저장 오류: " + err.message); }
  });

  document.getElementById("duplicateConfirmBtn").addEventListener("click", () => {
    duplicateMsg.style.display = "none";
  });

  await loadOptionStatus();
});
</script>
</body>
</html>
