<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>생면공정(주정)</title>
<link rel="icon" type="image/png" sizes="192x192" href="Waterdrop.png">
<style>
  :root { --g: #4CAF50; --muted:#e0e0e0; }
  html,body{height:100%;margin:0;font-family:Arial,Helvetica,sans-serif;background:#f6f7f8;}
  .app-container{display:flex;flex-direction:column;min-height:100vh;}
  .app-header{background:var(--g);color:#fff;padding:16px 12px;text-align:center;font-size:1.4rem;font-weight:700;}
  .app-body{flex:1;padding:12px;box-sizing:border-box;}
  .app-footer{padding:0;}
  .card{background:#fff;border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
  label{display:block;font-size:0.95rem;margin-bottom:6px;color:#222;}
  input[type="date"], select, input[type="number"]{width:100%;padding:8px;font-size:0.95rem;border:1px solid #ddd;border-radius:8px;box-sizing:border-box;}
  .row-flex{display:flex;gap:8px;align-items:center;}
  .col{flex:1;min-width:0;}
  .label-inline{flex:0 0 110px;font-weight:700;font-size:0.95rem;}
  #rounds .row{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;border:1px solid #eee;margin-bottom:8px;}
  .btn{padding:8px 10px;border-radius:8px;border:0;background:var(--muted);font-weight:700;cursor:pointer;font-size:0.95rem;}
  .btn.selected{background:var(--g);color:#fff;box-shadow:inset 0 0 0 2px rgba(0,0,0,0.04);}
  .result{margin-left:auto;font-weight:700;font-size:0.95rem;text-align:right;min-width:80px;}
  #submitBtn{width:100%;background:var(--g);color:#fff;border:0;border-radius:10px;font-size:1.1rem;cursor:pointer;}
  #loadingMsg{display:none;margin:8px 0;color:#666;font-weight:700;}
  #duplicateMsg{display:none;background:#fff3f3;border:1px solid #f2c2c2;padding:10px;border-radius:8px;}
  @media(max-width:420px){
    .label-inline{flex:0 0 90px;font-size:0.85rem;}
    .btn{padding:7px 8px;font-size:0.9rem;}
    .result{min-width:70px;font-size:0.9rem;}
  }
</style>
</head>
<body>
<div class="app-container">
  <div class="app-header">생면공정 점검</div>

  <div class="app-body">
    <div class="card">
      <label for="date">날짜</label>
      <input type="date" id="date" />

      <label for="product" style="margin-top:10px;">생산제품</label>
      <select id="product">
        <option value="">-- 선택하세요 --</option>
        <option value="메밀생면">메밀생면</option>
        <option value="생칼국수">생칼국수</option>
        <option value="생우동면">생우동면</option>
      </select>

      <div style="margin-top:12px;" class="row-flex">
        <div style="flex:1;">
          <label style="margin-bottom:6px;">총생산 LOT 수</label>
          <select id="lotInput" style="font-size:0.95rem;"></select>
        </div>
        <div style="flex:1;">
          <label style="margin-bottom:6px;">총중량 (kg)</label>
          <input type="number" id="totalKg" readonly style="text-align:right;" />
        </div>
      </div>

      <div id="loadingMsg">⏳ 중복 확인 중...</div>
      <div id="duplicateMsg">
        <div id="duplicateText" style="font-weight:700;margin-bottom:8px;"></div>
        <div style="display:flex;gap:8px;">
          <button id="duplicateConfirmBtn" class="btn" style="background:var(--g);color:#fff;">기존 불러오기</button>
          <button id="duplicateCancelBtn" class="btn">새로 입력</button>
        </div>
      </div>
    </div>

    <div id="rounds" class="card" style="display:none;"></div>
  </div>

  <div class="app-footer">
    <button id="submitBtn">📥 저장하기</button>
  </div>
</div>


<script>
const scriptUrl = "https://script.google.com/macros/s/AKfycbyqtL0wcteU6s0yZoY5ujpvhqbeq-s0TCerDoIBsicmNgwkm5rOIMYi-eMDAeOUF4A0RQ/exec";
const MAX_ROUNDS = 20; // 최대 차수 (LOT) 제한

document.addEventListener("DOMContentLoaded", () => {

  const params = new URLSearchParams(location.search);
  const paramDate = params.get("date");

  const dateInput = document.getElementById("date");
  const productInput = document.getElementById("product");
  const lotInput = document.getElementById("lotInput");
  const totalKgInput = document.getElementById("totalKg");
  const roundsDiv = document.getElementById("rounds");
  const loadingMsg = document.getElementById("loadingMsg");
  const duplicateMsg = document.getElementById("duplicateMsg");
  const duplicateText = document.getElementById("duplicateText");
  const duplicateConfirmBtn = document.getElementById("duplicateConfirmBtn");
  const duplicateCancelBtn = document.getElementById("duplicateCancelBtn");
  const submitBtn = document.getElementById("submitBtn");

  // 상단 헤더 높이와 하단 버튼 고정
  const header = document.querySelector(".app-header");
  if (header) {
    const headerHeight = header.offsetHeight || 48;
    submitBtn.style.height = `${headerHeight}px`;
  }
  submitBtn.style.position = "fixed";
  submitBtn.style.bottom = "0";
  submitBtn.style.left = "0";
  submitBtn.style.width = "100%";
  submitBtn.style.zIndex = "9999";

  dateInput.valueAsDate = paramDate ? new Date(paramDate) : new Date();

  let roundData = {};

  // lotInput 초기 옵션 고정
  lotInput.innerHTML = `<option value="0">0</option>` +
    Array.from({ length: MAX_ROUNDS }, (_, i) => `<option value="${i + 1}">${i + 1}</option>`).join("");
  lotInput.value = "0";

  // =========================
  // createRounds: LOT 버튼 생성
  // =========================
  function createRounds(lotCount, existing = null) {
    roundsDiv.innerHTML = "";
    roundData = {};

    // 값 있는 셀만 카운트
    const actualCount = existing
      ? existing.filter(item => item.no !== "" || item.value !== "").length
      : lotCount;

    if (!actualCount || actualCount <= 0) {
      roundsDiv.style.display = "none";
      lotInput.value = 0;
      return;
    }

    for (let i = 0; i < actualCount; i++) {
      const data = existing && existing[i] ? existing[i] : { no: 60, value: 1 };

      const row = document.createElement("div");
      row.className = "row";
      row.dataset.round = i + 1;
      row.style.display = "flex";
      row.style.alignItems = "center";
      row.style.gap = "8px";
      row.style.padding = "8px";
      row.style.border = "1px solid #eee";
      row.style.borderRadius = "8px";
      row.style.marginBottom = "8px";

      row.innerHTML = `
        <div style="flex:0 0 48px;font-weight:700;">${i + 1}차</div>
        <button class="btn" type="button" data-type="3포">3포</button>
        <button class="btn" type="button" data-type="2포">2포</button>
        <div class="result" id="result${i + 1}" style="margin-left:auto;font-weight:700;min-width:80px;text-align:right;"></div>
      `;
      roundsDiv.appendChild(row);

      const btn3 = row.querySelector(".btn[data-type='3포']");
      const btn2 = row.querySelector(".btn[data-type='2포']");
      const resEl = row.querySelector(".result");

      let initNo = data.no ?? 60;
      let initValue = data.value ?? 1;

      // 값이 한쪽만 있으면 보정
      if (data.no === "" && data.value !== "") initNo = data.value === 1 ? 60 : 40;
      if (data.value === "" && data.no !== "") initValue = data.no === 60 ? 1 : 0.7;

      roundData[i + 1] = { no: initNo, value: initValue };

      btn2.classList.remove("selected");
      btn3.classList.remove("selected");
      if (initNo === 60) btn3.classList.add("selected");
      else btn2.classList.add("selected");

      resEl.textContent = `주정 ${initValue} kg`;

      btn3.addEventListener("click", () => handleSelect(i + 1, 60, 1, row));
      btn2.addEventListener("click", () => handleSelect(i + 1, 40, 0.7, row));
    }

    lotInput.value = actualCount;
    roundsDiv.style.display = "block";
    updateTotalKg();
  }

  // =========================
  // handleSelect: 버튼 선택
  // =========================
  function handleSelect(idx, no, value, row) {
    const current = roundData[idx];

    if (current && current.no === no) {
      delete roundData[idx];
      const keys = Object.keys(roundData).map(Number).sort((a, b) => a - b);
      for (let i = idx + 1; i <= (keys[keys.length - 1] || 0); i++) {
        if (roundData[i]) {
          roundData[i - 1] = roundData[i];
          delete roundData[i];
        }
      }
      createRounds(Object.keys(roundData).length, Object.values(roundData));
      return;
    }

    row.querySelectorAll(".btn").forEach(b => b.classList.remove("selected"));
    const btn = row.querySelector(`.btn[data-type='${no === 60 ? "3포" : "2포"}']`);
    if (btn) btn.classList.add("selected");

    roundData[idx] = { no: Number(no), value: Number(value) };
    const resEl = row.querySelector(".result");
    if (resEl) resEl.textContent = `주정 ${value} kg`;

    updateTotalKg();
  }

  // =========================
  // 총 KG 계산
  // =========================
  function updateTotalKg() {
    let total = 0;
    Object.values(roundData).forEach(r => {
      const nv = Number(r?.no);
      if (!isNaN(nv)) total += nv;
    });
    totalKgInput.value = total;
  }

  lotInput.addEventListener("change", () => {
    const cnt = Number(lotInput.value) || 0;
    createRounds(cnt, null);
  });

  // =========================
  // 중복 체크
  // =========================
  async function checkDuplicate(date) {
    loadingMsg.style.display = "block";
    duplicateMsg.style.display = "none";
    submitBtn.disabled = true;
    try {
      const res = await fetch(`${scriptUrl}?checkSaengmyeon=${encodeURIComponent(JSON.stringify({ date }))}`);
      const data = await res.json();
      loadingMsg.style.display = "none";

      if (data?.exists) {
        duplicateText.textContent = `${date} 에 이미 입력된 데이터가 있습니다.`;
        duplicateMsg.style.display = "block";
      } else {
        duplicateMsg.style.display = "none";
        submitBtn.disabled = false;
      }
    } catch (e) {
      loadingMsg.style.display = "none";
      alert("중복 확인 오류");
      submitBtn.disabled = false;
    }
  }

  // =========================
  // 중복 데이터 복원
  // =========================
  async function restoreDuplicateData(date) {
    loadingMsg.style.display = "block";
    try {
      const res = await fetch(`${scriptUrl}?getSaengmyeon=${encodeURIComponent(JSON.stringify({ date }))}`);
      const data = await res.json();
      loadingMsg.style.display = "none";

      if (!data?.no) { alert("불러올 데이터 없음"); return; }

      productInput.value = data.product || "";

      const noArr = data.no || [];
      const valueArr = data.value || [];
      const maxLen = Math.max(noArr.length, valueArr.length);
      const filled = [];

      for (let i = 0; i < maxLen; i++) {
        const rawNo = (noArr[i] ?? "").toString().trim();
        const rawVal = (valueArr[i] ?? "").toString().trim();
        if (rawNo === "" && rawVal === "") continue; // 값 없는 LOT 제외

        const parsedNo = rawNo !== "" ? Number(rawNo) : (rawVal == 1 ? 60 : 40);
        const parsedVal = rawVal !== "" ? Number(rawVal) : (parsedNo === 60 ? 1 : 0.7);

        filled.push({ no: parsedNo, value: parsedVal });
      }

      createRounds(filled.length, filled);
      submitBtn.disabled = false;

    } catch (err) {
      loadingMsg.style.display = "none";
      alert("데이터 불러오기 오류");
      console.error(err);
      submitBtn.disabled = false;
    }
  }

  dateInput.addEventListener("change", () => {
    productInput.value = "";
    lotInput.value = "0";
    roundsDiv.innerHTML = "";
    totalKgInput.value = "";
    if (dateInput.value) checkDuplicate(dateInput.value);
  });

  duplicateConfirmBtn.addEventListener("click", () => {
    duplicateMsg.style.display = "none";
    if (dateInput.value) restoreDuplicateData(dateInput.value);
  });

  duplicateCancelBtn.addEventListener("click", () => {
    duplicateMsg.style.display = "none";
    dateInput.valueAsDate = new Date();
    checkDuplicate(dateInput.value);
  });

  // =========================
  // submit
  // =========================
  submitBtn.addEventListener("click", async () => {
    if (!dateInput.value) return alert("날짜를 선택하세요.");
    if (!productInput.value) return alert("생산제품을 선택하세요.");

    const lotCount = Object.keys(roundData).length;
    if (lotCount === 0) return alert("총생산 LOT 수를 선택하세요.");
    if (!totalKgInput.value || Number(totalKgInput.value) === 0) return alert("총중량 오류");

    const noArr = [];
    const valueArr = [];
    for (let i = 1; i <= lotCount; i++) {
      if (roundData[i]) {
        noArr.push(Number(roundData[i].no));
        valueArr.push(Number(roundData[i].value));
      } else {
        noArr.push("");
        valueArr.push("");
      }
    }

    const payload = {
      date: dateInput.value,
      product: productInput.value,
      weight: totalKgInput.value,
      lot: lotCount,
      no: noArr,
      value: valueArr
    };

    try {
      submitBtn.disabled = true;
      const formBody = new URLSearchParams();
      formBody.append("saengmyeon", JSON.stringify(payload));

      const res = await fetch(scriptUrl, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
        body: formBody.toString()
      });

      const result = await res.json();
      submitBtn.disabled = false;

      if (result?.result === "success" || result?.success) {
        alert(result.message || "저장되었습니다.");
      } else {
        alert("저장 오류: " + (result.error || result.message || JSON.stringify(result)));
      }
    } catch (err) {
      submitBtn.disabled = false;
      alert("서버 오류: " + (err?.message || err));
    }
  });

  if (dateInput.value) checkDuplicate(dateInput.value);

});
</script>




</body>
</html>
