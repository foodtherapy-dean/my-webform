<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>건면공정 모니터</title>
<style>
  body, html { margin:0; padding:0; height:100%; font-family:sans-serif; }
  .app-container { display:flex; flex-direction:column; height:100%; }
  .app-header { background:#4CAF50; color:#fff; text-align:center; padding:16px; font-size:1.6rem; }
  .app-body { flex:1 1 auto; overflow-y:auto; padding:20px; box-sizing:border-box; background:#f9f9f9; }
  .app-footer { flex:0 0 auto; }
  
  button { cursor:pointer; border-radius:6px; border:none; }
  #submitBtn { width:100%; font-size:1.5rem; padding:20px 0; background:#4CAF50; color:#fff; }
  #bulkToggleBtn { background: #2e7d32; color: white; padding: 12px; font-size: 1rem; margin-bottom: 15px; width: 100%; font-weight: bold; }
  #bulkSubmitBtn { background: #e91e63; color: white; width: 100%; padding: 15px; font-size: 1.2rem; margin-top: 10px; }

  .section-card { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
  .inline-row { display:flex; gap:15px; margin-top:10px; }
  .inline-row > * { flex:1; }
  
  label { display:block; margin-bottom:6px; font-weight: bold; color: #555; }
  input, select { width:100%; padding:12px; font-size:1.1rem; border:1px solid #ccc; border-radius:6px; box-sizing: border-box; }
  
  #duplicateMsg { display:none; background:#ffcccc; color:#900; padding:12px; margin:10px 0; border:1px solid #900; border-radius:6px; font-weight:bold; }
  #loadingMsg { display:none; background:#ffe599; color:#333; padding:8px; margin-bottom:10px; border-radius:6px; font-weight:bold; text-align:center; }
  .hint { font-size: 0.85rem; color: #666; margin-top: 4px; }
</style>
</head>
<body>

<div class="app-container">
  <div class="app-header">건면공정 점검 입력</div>

  <div class="app-body">
    <div class="section-card">
      <label for="date">공정 날짜 선택</label>
      <input type="date" id="date" required />
    </div>

    <div id="loadingMsg">데이터 조회 중...</div>
    <div id="duplicateMsg">
      <span id="duplicateText"></span>
      <button id="duplicateConfirmBtn" style="background:#900; color:#fff; padding:4px 10px; margin-left:10px;">확인</button>
    </div>

    <button id="bulkToggleBtn">🚀 일괄 자동 입력 모드 열기</button>

    <div id="bulkSection" class="section-card" style="display:none; border: 2px solid #e91e63;">
      <h3 style="margin-top:0; color:#e91e63;">전체 공정 자동 등록</h3>
      <div class="inline-row">
        <div>
          <label>제품명</label>
          <select id="bulkProduct">
            <option value="일반국수">일반국수</option>
            <option value="치자국수">치자국수</option>
            <option value="메밀국수">메밀국수</option>
          </select>
        </div>
        <div>
          <label>수량</label>
          <input type="number" id="bulkCount" placeholder="0" />
        </div>
      </div>
      <label style="margin-top:15px;">시스템 ON 시간 (기준)</label>
      <div class="inline-row">
        <select id="bulkHour"></select>
        <select id="bulkMinute"></select>
      </div>
      <div id="bulkPreview" class="hint" style="background:#f0f0f0; padding:12px; margin-top:15px; border-radius:4px; line-height:1.6; border-left:4px solid #e91e63;">
        시간을 선택하면 추천 일정이 계산됩니다.
      </div>
      <button id="bulkSubmitBtn">⚡ 전송 및 전체 자동 등록</button>
    </div>

    <div id="singleSection">
      <div class="section-card">
        <label for="group">단계별 개별 선택</label>
        <select id="group">
          <option value="">선택하세요</option>
          <option value="생산제품">생산제품</option>
          <option value="시스템ON">시스템ON</option>
          <option value="1차점검">1차점검</option>
          <option value="2차점검">2차점검</option>
          <option value="시스템OFF">시스템OFF</option>
        </select>

        <div class="inline-row" id="timeRow" style="display:none; margin-top:15px;">
          <div><label>시간(시)</label><select id="hour"></select></div>
          <div><label>시간(분)</label><select id="minute"></select></div>
        </div>
        <div id="suggestionText" style="color:blue; font-size:0.9rem; margin:8px 0; font-weight:bold;"></div>

        <div class="inline-row" id="thRow" style="display:none;">
          <div><label>온도(℃)</label><input type="number" id="temp" step="1" /></div>
          <div><label>습도(%)</label><input type="number" id="humidity" step="1" /></div>
        </div>

        <div class="inline-row" id="productRow" style="display:none;">
          <div><label>제품명</label><select id="product">
            <option value="">선택</option>
            <option value="일반국수">일반국수</option>
            <option value="치자국수">치자국수</option>
            <option value="메밀국수">메밀국수</option>
          </select></div>
          <div><label>수량</label><input type="number" id="singleCount" /></div>
        </div>
      </div>
      <div class="app-footer">
        <button id="submitBtn">📥 개별 항목 서버 전송</button>
      </div>
    </div>
  </div>
</div>

<script>
window.addEventListener("DOMContentLoaded", async function () {
  const scriptUrl = "https://script.google.com/macros/s/AKfycbx6Cts4QP8iximKfLgUAlzNP1ybUUfVcY7L1-VxhA8PwTOFO06ia04xj63XQGdCUuLFRg/exec";
  let loadedData = {};

  const dateInput = document.getElementById("date");
  const groupSelect = document.getElementById("group");
  const bulkSection = document.getElementById("bulkSection");
  const singleSection = document.getElementById("singleSection");
  const bulkToggleBtn = document.getElementById("bulkToggleBtn");
  const loadingMsg = document.getElementById("loadingMsg");
  const duplicateMsg = document.getElementById("duplicateMsg");
  const duplicateText = document.getElementById("duplicateText");
  const suggestionText = document.getElementById("suggestionText");

  dateInput.valueAsDate = new Date();

  function fillOptions(hEl, mEl) {
    hEl.innerHTML = '<option value="">시</option>';
    for (let h = 1; h <= 24; h++) hEl.innerHTML += `<option value="${h.toString().padStart(2,"0")}">${h.toString().padStart(2,"0")}</option>`;
    mEl.innerHTML = '<option value="">분</option>';
    for (let m = 0; m < 60; m++) mEl.innerHTML += `<option value="${m.toString().padStart(2,"0")}">${m.toString().padStart(2,"0")}</option>`;
  }
  fillOptions(document.getElementById("hour"), document.getElementById("minute"));
  fillOptions(document.getElementById("bulkHour"), document.getElementById("bulkMinute"));

  async function updateCompletionStatus() {
    const dateVal = dateInput.value;
    if (!dateVal) return;
    try {
      const query = encodeURIComponent(JSON.stringify({ date: dateVal }));
      const res = await fetch(`${scriptUrl}?getNoodle=${query}`);
      const data = res.ok ? await res.json() : {};
      const completed = data.options || [];

      Array.from(groupSelect.options).forEach(opt => {
        if (!opt.value) return;
        const baseValue = opt.value.replace("(완료)", "").trim();
        opt.textContent = completed.includes(baseValue) ? `${baseValue}(완료)` : baseValue;
        opt.value = baseValue;
      });
    } catch (e) { console.error("상태 업데이트 실패", e); }
  }

  async function checkDuplicate(group, isInternal = false) {
    const date = dateInput.value;
    if (!date || !group) return;
    loadingMsg.style.display = "block";
    try {
      const res = await fetch(`${scriptUrl}?checkNoodle=` + encodeURIComponent(JSON.stringify({date, group})));
      const result = await res.json();
      loadingMsg.style.display = "none";
      loadedData[group] = { fetched: true, data: result.data || null };

      if (!isInternal && result.exists) {
        duplicateText.textContent = `⚠️ [${group}] 데이터가 이미 존재합니다.`;
        duplicateMsg.style.display = "block";
        if(result.data) {
          if(group === "생산제품") {
            document.getElementById("product").value = result.data.product || "";
            document.getElementById("singleCount").value = result.data.count || "";
          } else {
            document.getElementById("hour").value = result.data.hour || "";
            document.getElementById("minute").value = result.data.minute || "";
            document.getElementById("temp").value = result.data.temp || "";
            document.getElementById("humidity").value = result.data.humi || "";
          }
        }
      }
      updateUIByGroup();
    } catch (e) { loadingMsg.style.display = "none"; }
  }

  function addTime(h, m, addH) {
    let nh = (parseInt(h) + addH) % 24;
    return `${nh.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}`;
  }

  // 일괄 입력을 위한 랜덤 분 가감 함수
  function getRandTime(h, m, offsetH, rangeMin = -10, rangeMax = 10) {
    let totalMinutes = parseInt(h) * 60 + parseInt(m) + (offsetH * 60);
    let randOffset = Math.floor(Math.random() * (rangeMax - rangeMin + 1)) + rangeMin;
    totalMinutes += randOffset;
    
    let nh = Math.floor(totalMinutes / 60) % 24;
    let nm = totalMinutes % 60;
    if (nm < 0) { nm += 60; nh = (nh - 1 + 24) % 24; }
    
    return {
      h: nh.toString().padStart(2, "0"),
      m: nm.toString().padStart(2, "0"),
      full: `${nh.toString().padStart(2, "0")}:${nm.toString().padStart(2, "0")}`
    };
  }

  function updateUIByGroup() {
    const g = groupSelect.value;
    document.getElementById("timeRow").style.display = (g && g !== "생산제품") ? "flex" : "none";
    document.getElementById("thRow").style.display = (g === "1차점검" || g === "2차점검") ? "flex" : "none";
    document.getElementById("productRow").style.display = (g === "생산제품") ? "flex" : "none";
    suggestionText.textContent = "";

    if (!g) return;
    const sysOn = loadedData["시스템ON"]?.data;
    const step1 = loadedData["1차점검"]?.data;
    if (g === "1차점검" && sysOn) suggestionText.textContent = "추천(ON+1h): " + addTime(sysOn.hour, sysOn.minute, 1);
    if (g === "2차점검" && step1) suggestionText.textContent = "추천(1차+15h): " + addTime(step1.hour, step1.minute, 15);
    if (g === "시스템OFF" && sysOn) suggestionText.textContent = "추천(ON+17h): " + addTime(sysOn.hour, sysOn.minute, 17);
  }

  bulkToggleBtn.addEventListener("click", () => {
    const isBulk = bulkSection.style.display === "none";
    bulkSection.style.display = isBulk ? "block" : "none";
    singleSection.style.display = isBulk ? "none" : "block";
    bulkToggleBtn.textContent = isBulk ? "⬅️ 개별 입력 모드로 전환" : "🚀 일괄 자동 입력 모드 열기";
  });

  groupSelect.addEventListener("change", () => {
    duplicateMsg.style.display = "none";
    checkDuplicate(groupSelect.value);
  });

  dateInput.addEventListener("change", () => {
    loadedData = {};
    updateCompletionStatus();
  });

  document.getElementById("duplicateConfirmBtn").addEventListener("click", () => duplicateMsg.style.display = "none");

  const bH = document.getElementById("bulkHour");
  const bM = document.getElementById("bulkMinute");
  [bH, bM].forEach(el => el.addEventListener("change", () => {
    if(bH.value && bM.value) {
      document.getElementById("bulkPreview").innerHTML = `
        <strong>자동 등록 예시 (시간 랜덤 가감됨):</strong><br>
        • 시스템ON: ${bH.value}:${bM.value}<br>
        • 1차점검: ON 기준 ±10분<br>
        • 2차점검: 1차 기준 ±10분<br>
        • 시스템OFF: 2차 기준 +1~10분
      `;
    }
  }));

  async function sendData(payload, reload = true) {
    try {
      await fetch(scriptUrl, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "noodle=" + encodeURIComponent(JSON.stringify(payload))
      });
      if(reload) { alert("저장되었습니다."); location.reload(); }
    } catch (e) { alert("오류 발생"); }
  }

 // 개별 항목 서버 전송 로직 (서버 통합 로직 대응)
document.getElementById("submitBtn").addEventListener("click", async () => {
  const g = groupSelect.value;
  if (!g) return alert("단계를 선택하세요.");

  // 1. 현재 입력된 데이터 수집
  const entry = {
    hour: document.getElementById("hour").value,
    minute: document.getElementById("minute").value,
    temp: document.getElementById("temp").value,
    humi: document.getElementById("humidity").value,
    product: document.getElementById("product").value,
    count: document.getElementById("singleCount").value
  };

  // 2. UI 상태 변경 (중복 클릭 방지)
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "⏳ 전송 중...";

  try {
    // 3. 서버가 기대하는 'entries' 배열 구조로 포장
    const payload = { 
      date: dateInput.value, 
      group: g, 
      entries: [entry] 
    };

    const response = await fetch(scriptUrl, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "noodle=" + encodeURIComponent(JSON.stringify(payload))
    });

    if (response.ok) {
      alert(`✅ [${g}] 항목이 저장되었습니다.`);
      location.reload(); // 저장 후 새로고침하여 상태 업데이트
    } else {
      throw new Error("서버 응답 실패");
    }

  } catch (e) {
    console.error("개별 전송 오류:", e);
    alert("저장에 실패했습니다. 네트워크 상태를 확인해주세요.");
  } finally {
    btn.disabled = false;
    btn.innerText = "📥 개별 항목 서버 전송";
  }
});

  // [보강/최적화] 일괄 등록 로직: 단일 네트워크 요청으로 처리 속도 향상
document.getElementById("bulkSubmitBtn").addEventListener("click", async () => {
  const h = bH.value; 
  const m = bM.value;
  const prod = document.getElementById("bulkProduct").value;
  const cnt = document.getElementById("bulkCount").value;
  
  if(!h || !m || !cnt) return alert("시간과 수량을 입력하세요.");

  // 랜덤 정수 생성 함수
  const getRandInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

  // 연쇄적 시간 계산
  const time1 = getRandTime(h, m, 1);             // ON 대비 1시간 후 ±10분
  const time2 = getRandTime(time1.h, time1.m, 15); // 1차 대비 15시간 후 ±10분
  const timeOff = getRandTime(time2.h, time2.m, 1, 1, 10); // 2차 대비 1시간 후 +1~10분

  // 1. 모든 단계를 하나의 배열(allEntries)로 구성
  const allEntries = [
    { g: "생산제품", d: { product: prod, count: cnt } },
    { g: "시스템ON", d: { hour: h, minute: m } },
    { g: "1차점검", d: { hour: time1.h, minute: time1.m, temp: getRandInt(32, 39), humi: getRandInt(58, 68) } },
    { g: "2차점검", d: { hour: time2.h, minute: time2.m, temp: getRandInt(35, 41), humi: getRandInt(46, 57) } },
    { g: "시스템OFF", d: { hour: timeOff.h, minute: timeOff.m } }
  ];

  if(!confirm("전체 데이터를 일괄 등록하시겠습니까?\n(시간 및 온습도가 자동 가감/생성됩니다)")) return;
  
  // UI 상태 변경
  const btn = document.getElementById("bulkSubmitBtn");
  btn.disabled = true;
  btn.innerText = "⏳ 서버 전송 중 (초고속)...";

  try {
    // 2. 루프 없이 단 한 번의 fetch 요청 전송
    const payload = { 
      date: dateInput.value, 
      allEntries: allEntries 
    };

    const response = await fetch(scriptUrl, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "noodle=" + encodeURIComponent(JSON.stringify(payload))
    });

    if (response.ok) {
      alert("🚀 모든 공정이 성공적으로 일괄 등록되었습니다!");
      location.reload();
    } else {
      throw new Error("서버 응답 오류");
    }

  } catch (e) {
    console.error("일괄 전송 오류:", e);
    alert("처리 중 오류가 발생했습니다. 다시 시도해 주세요.");
  } finally {
    btn.disabled = false;
    btn.innerText = "⚡ 전송 및 전체 자동 등록";
  }
});

  updateCompletionStatus();
});
</script>
</body>
</html>
