<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>건면공정 모니터링</title>
    <!- 홈화면  바로가기용 아이콘 지정 ->
<link rel="icon" type="image/png" sizes="192x192" href="Noodles.png">
<link rel="apple-touch-icon" href="Noodles.png">
<meta name="theme-color" content="#4CAF50">

<!-- PWA (홈화면 설치시 아이콘 및 이름 지정) -->
<link rel="manifest" href="manifest.json"> 
<style>
body, html { margin:0; padding:0; height:100%; font-family:sans-serif; }
.app-container { display:flex; flex-direction:column; height:100%; }
.app-header { background:#4CAF50; color:#fff; text-align:center; padding:16px; font-size:1.6rem; }
.app-body { flex:1 1 auto; overflow-y:auto; padding:20px; box-sizing:border-box; background:#f9f9f9; }
.app-footer { flex:0 0 auto; }
#submitBtn { width:100%; font-size:1.5rem; padding:20px 0; background:#4CAF50; color:#fff; border:none; cursor:pointer; }
.inline-row { display:flex; gap:20px; margin-top:10px; }
.inline-row > * { flex:1; }
label { display:block; margin-bottom:6px; }
input, select { width:100%; padding:14px 16px; font-size:1.2rem; border:1px solid #ccc; border-radius:6px; }
#duplicateMsg { display:none; background:#ffcccc; color:#900; padding:12px; margin-top:6px; border:1px solid #900; border-radius:6px; font-weight:bold; }
#duplicateMsg button { margin-left:12px; background:#900; color:#fff; border:none; padding:4px 10px; border-radius:4px; cursor:pointer; }
#loadingMsg { display:none; background:#ffe599; color:#333; padding:8px; margin-bottom:10px; border-radius:6px; font-weight:bold; }
</style>
</head>
<body>
<div class="app-container">
  <div class="app-header">건면공정 점검 입력</div>

  <div class="app-body">
    <!-- 날짜 -->
    <label for="date">날짜</label>
    <input type="date" id="date" required />

    <!-- 점검 옵션 -->
    <label for="group" style="margin-top:20px;">점검 옵션</label>
    <select id="group" required>
      <option value="">선택하세요</option>
      <option value="생산제품">생산제품</option>
      <option value="시스템ON">시스템ON</option>
      <option value="1차점검">1차점검</option>
      <option value="2차점검">2차점검</option>
      <option value="시스템OFF">시스템OFF</option>
    </select>

    <!-- 중복 메시지 -->
    <div id="duplicateMsg">
      <span id="duplicateText"></span>
      <button id="duplicateConfirmBtn">확인</button>
    </div>

    <!-- 로딩 메시지 -->
    <div id="loadingMsg">중복 확인 중...</div>

    <!-- 시간 입력 -->
    <div class="inline-row" id="timeRow">
      <div>
        <label for="hour">시간 (시)</label>
        <select id="hour"></select>
      </div>
      <div>
        <label for="minute">시간 (분)</label>
        <select id="minute"></select>
      </div>
    </div>

    <!-- 온도 / 습도 입력 -->
    <div class="inline-row" id="thRow">
      <div>
        <label for="temp">온도(℃)</label>
        <input type="number" id="temp" step="0.1" min="0" max="100" />
      </div>
      <div>
        <label for="humidity">습도(%)</label>
        <input type="number" id="humidity" step="0.1" min="0" max="100" />
      </div>
    </div>

    <!-- 생산제품 입력 -->
    <div class="inline-row" id="productRow" style="display:none;">
      <div>
        <label for="product">제품명</label>
        <select id="product">
          <option value="">선택하세요</option>
          <option value="일반국수">일반국수</option>
          <option value="치자국수">치자국수</option>
          <option value="메밀국수">메밀국수</option>
        </select>
      </div>
      <div>
        <label for="count">수량</label>
        <input type="number" id="count" min="1" />
      </div>
    </div>
  </div>

  <div class="app-footer">
    <button id="submitBtn">📥 서버로 전송</button>
  </div>
</div>

<script>
window.addEventListener("DOMContentLoaded", async function () {
  const params = new URLSearchParams(location.search);
  const paramDate = params.get("date");

  const dateInput = document.getElementById("date");
  if (dateInput) {
    if (paramDate) dateInput.value = paramDate;
    else dateInput.valueAsDate = new Date();
  }

  const groupSelect = document.getElementById("group");
  const hourSelect = document.getElementById("hour");
  const minuteSelect = document.getElementById("minute");
  const tempInput = document.getElementById("temp");
  const humidityInput = document.getElementById("humidity");
  const productRow = document.getElementById("productRow");
  const productSelect = document.getElementById("product");
  const countInput = document.getElementById("count");
  const submitBtn = document.getElementById("submitBtn");
  const duplicateMsg = document.getElementById("duplicateMsg");
  const duplicateText = document.getElementById("duplicateText");
  const duplicateConfirmBtn = document.getElementById("duplicateConfirmBtn");
  const loadingMsg = document.getElementById("loadingMsg");
  const timeRow = document.getElementById("timeRow");
  const thRow = document.getElementById("thRow");
  const suggestionSpan = document.createElement("span");
  suggestionSpan.style.display = "block";
  suggestionSpan.style.marginTop = "4px";
  suggestionSpan.style.fontSize = "0.9em";
  suggestionSpan.style.color = "blue";
  timeRow.insertAdjacentElement("afterend", suggestionSpan);

  const scriptUrl = "https://script.google.com/macros/s/AKfycbyhzzrgM7tPU5J5tksLnLtwVVhFV0-vE8_wTM7mJWfdhWvTXS5MO4nLpFiwTB9EJBFj5g/exec";
  const orderMap = ["시스템ON","1차점검","2차점검","시스템OFF"];
  let loadedData = {};

  // 시/분 옵션 채우기
  function fillTimeOptions() {
    hourSelect.innerHTML = '<option value=""></option>';
    for (let h = 1; h <= 24; h++) hourSelect.innerHTML += `<option value="${h.toString().padStart(2,"0")}">${h.toString().padStart(2,"0")}</option>`;
    minuteSelect.innerHTML = '<option value=""></option>';
    for (let m = 0; m < 60; m+=10) minuteSelect.innerHTML += `<option value="${m.toString().padStart(2,"0")}">${m.toString().padStart(2,"0")}</option>`;
  }
  fillTimeOptions();

  // ====== 옵션 완료 표시 함수 ======
  async function updateOptionCompletion(dateVal) {
    try {
      if (!dateVal) return;
      const query = encodeURIComponent(JSON.stringify({ date: dateVal }));
      const res = await fetch(`${scriptUrl}?getNoodle=${query}`);
      const data = res.ok ? await res.json() : {};
      const existingGroups = data.options || [];

      Array.from(groupSelect.options).forEach(opt => {
        if (!opt.value) return;
        const clean = opt.value.trim();
        opt.textContent = existingGroups.includes(clean) ? `${clean}(완료)` : clean;
        opt.value = clean;
      });
    } catch (err) {
      console.error("옵션 완료 업데이트 오류:", err);
    }
  }

  // ====== 중복 확인 ======
  async function checkDuplicate(date, group, internal=false) {
    if (!date || !group) return false;
    loadingMsg.style.display = "block"; submitBtn.disabled = true;
    try {
      const res = await fetch(`${scriptUrl}?checkNoodle=` + encodeURIComponent(JSON.stringify({date,group})));
      const data = await res.json();
      loadingMsg.style.display = "none"; submitBtn.disabled = false;
      loadedData[group] = { fetched:true, data: data.data || null };

      if (!internal && data.exists) {
        duplicateText.textContent = `⚠️ 이미 같은 날짜(${date})와 옵션(${group}) 데이터가 존재합니다.`;
        duplicateMsg.style.display = "block";
        const d = data.data;
        if (d) {
          hourSelect.value = d.hour || "";
          minuteSelect.value = d.minute || "";
          tempInput.value = d.temp || "";
          humidityInput.value = d.humi || "";
          productSelect.value = d.product || "";
          countInput.value = d.count || "";
        }
      }

      updateInputFields(); updateSuggestion();
      return true;
    } catch(err) {
      loadingMsg.style.display = "none"; submitBtn.disabled = false;
      if (!internal) { duplicateText.textContent="중복 확인 오류!"; duplicateMsg.style.display="block"; }
      return false;
    }
  }

  // ====== 추천시간 계산 ======
  function updateSuggestion() {
    const sel = groupSelect.value;
    let suggestedText = "";
    const sysOnData = loadedData["시스템ON"]?.data;
    const firstData = loadedData["1차점검"]?.data;
    const secondData = loadedData["2차점검"]?.data;

    if (sel==="1차점검") {
      suggestedText = (!sysOnData?.hour || !sysOnData?.minute) ? "시스템ON 미입력" : "추천: "+addTime(sysOnData.hour, sysOnData.minute,1);
    } else if (sel==="2차점검") {
      suggestedText = (!firstData?.hour || !firstData?.minute) ? "1차점검 미입력" : "추천: "+addTime(firstData.hour, firstData.minute,16);
    } else if (sel==="시스템OFF") {
      suggestedText = (!secondData?.hour || !secondData?.minute) ? "2차점검 미입력" : (!sysOnData?.hour || !sysOnData?.minute) ? "시스템ON 미입력" : "추천: "+addTime(sysOnData.hour, sysOnData.minute,17);
    } else suggestedText = "";
    suggestionSpan.textContent = suggestedText;
  }

  function addTime(hour, minute, addHours) {
    let h = parseInt(hour,10); let m = parseInt(minute,10);
    h = (h+addHours)%24;
    return `${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}`;
  }

  // ====== 입력 필드 표시 ======
  function updateInputFields() {
    const g = groupSelect.value;
    timeRow.style.display="none"; thRow.style.display="none"; productRow.style.display="none"; suggestionSpan.style.display="none";
    if (g==="시스템ON" || g==="시스템OFF") { timeRow.style.display="flex"; suggestionSpan.style.display="block"; }
    else if (g==="1차점검" || g==="2차점검") { timeRow.style.display="flex"; thRow.style.display="flex"; suggestionSpan.style.display="block"; }
    else if (g==="생산제품") { productRow.style.display="flex"; }
  }

  duplicateConfirmBtn.addEventListener("click", ()=>{ duplicateMsg.style.display="none"; });

  // ====== groupSelect 이벤트 ======
  groupSelect.addEventListener("focus", async () => { await updateOptionCompletion(dateInput.value); });

  groupSelect.addEventListener("change", async () => {
    timeRow.style.display = thRow.style.display = productRow.style.display = suggestionSpan.style.display = "none";
    duplicateMsg.style.display = false; duplicateText.textContent="";
    hourSelect.value=""; minuteSelect.value=""; tempInput.value=""; humidityInput.value="";
    productSelect.value=""; countInput.value="";
    const selected = groupSelect.value;
    const idx = orderMap.indexOf(selected);

    // 직전 옵션 데이터 없으면 internal=true 로 불러오기
    if (selected==="시스템OFF") {
      if (!loadedData["2차점검"]) await checkDuplicate(dateInput.value,"2차점검",true);
      if (!loadedData["시스템ON"]) await checkDuplicate(dateInput.value,"시스템ON",true);
    } else if (idx>0 && !loadedData[orderMap[idx-1]]) {
      await checkDuplicate(dateInput.value,orderMap[idx-1],true);
    }

    if (dateInput.value && selected) await checkDuplicate(dateInput.value, selected,false);
  });

  dateInput.addEventListener("change", async ()=>{
    groupSelect.value=""; duplicateMsg.style.display="none"; duplicateText.textContent="";
    hourSelect.value=""; minuteSelect.value=""; tempInput.value=""; humidityInput.value="";
    productSelect.value=""; countInput.value=""; loadedData={};
    updateInputFields(); await updateOptionCompletion(dateInput.value);
  });

  hourSelect.addEventListener("change", updateSuggestion);

  // ====== 제출 ======
  submitBtn.addEventListener("click", async ()=>{
    if (!groupSelect.value) { alert("점검 옵션 선택"); return; }
    if (!dateInput.value) { alert("날짜 선택"); return; }
    if (timeRow.style.display!=="none" && (!hourSelect.value || !minuteSelect.value)) { alert("시간 선택"); return; }
    if (thRow.style.display!=="none" && (!tempInput.value || !humidityInput.value)) { alert("온도/습도 입력"); return; }
    if (productRow.style.display!=="none" && (!productSelect.value || !countInput.value)) { alert("제품/수량 입력"); return; }

    const entries = productRow.style.display!=="none" ?
      [{ product: productSelect.value, count: countInput.value }] :
      [{ hour:hourSelect.value, minute:minuteSelect.value, temp:tempInput.value, humi:humidityInput.value, product:productSelect.value||"", count:countInput.value||"" }];
    
    const payload = { date: dateInput.value, group: groupSelect.value, entries: entries };

    try {
      const res = await fetch(scriptUrl,{
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:"noodle="+encodeURIComponent(JSON.stringify(payload))
      });
      const text = await res.text();
      alert("서버 응답: "+text);
      location.reload();
    } catch(err){ alert("서버 전송 오류: "+err.message); }
  });

  // 초기 표시
  updateInputFields();
  await updateOptionCompletion(dateInput.value);
});
</script>


</body>
</html>
