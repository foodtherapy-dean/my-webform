<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>스마트 방충 관리 v3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* ... 기존 스타일 유지 ... */
    html, body { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #f4f7f6; }
    .app-container { display: flex; flex-direction: column; height: 100%; }
    .app-header { background: #2196F3; color: white; text-align: center; padding: 15px; font-size: 1.3rem; }
    .app-body { flex: 1; overflow-y: auto; padding: 15px; }
    .status-msg { background: #e3f2fd; padding: 10px; border-radius: 8px; margin-bottom: 10px; color: #1565c0; font-weight: bold; border: 1px solid #bbdefb; }
    .hidden { display: none !important; }
    .mode-btn-row { display: flex; gap: 10px; margin: 15px 0; }
    .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; }
    .btn-blue { background: #2196F3; }
    .btn-green { background: #4CAF50; }
    .btn-red { background: #f44336; margin-bottom: 15px; }
    .entry { border: 1px solid #ccc; padding: 12px; margin-top: 10px; border-radius: 8px; background: white; }
    .input-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .input-group { flex: 1 1 calc(33% - 8px); min-width: 80px; text-align: center; }
    .input-group input { width: 100%; text-align: center; padding: 8px; border: 1px solid #ddd; }
    #loadingMsg { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(0,0,0,0.8); color:white; padding:25px; border-radius:12px; z-index:9999; }
  </style>
</head>
<body>

<div id="loadingMsg">⏳ 처리 중...</div>

<div class="app-container">
  <div class="app-header">스마트 방충 관리</div>
  <div class="app-body">
    <label>📅 날짜</label>
    <input type="date" id="date">

    <div id="statusArea" class="status-msg hidden"></div>
    <button type="button" id="deleteAllBtn" class="btn btn-red hidden">🗑 해당날짜 전체삭제</button>

    <div id="modeButtons" class="mode-btn-row hidden">
      <button type="button" id="manualModeBtn" class="btn btn-blue">📝 개별 입력</button>
      <button type="button" id="autoModeBtn" class="btn btn-green">🎲 일괄 입력(랜덤)</button>
    </div>

    <div id="groupArea" class="hidden">
      <label>⚙ 그룹 선택</label>
      <select id="group">
        <option value="">선택하세요</option>
        <option value="건면동">건면동</option>
        <option value="생면동">생면동</option>
      </select>
    </div>

    <form id="trapForm">
      <div id="sections"></div>
    </form>
  </div>
  <div class="app-footer">
    <button type="submit" form="trapForm" class="btn btn-green" style="width:100%; border-radius:0; height:60px;">📥 서버로 전송하기</button>
  </div>
</div>

<script>
const scriptUrl = "YOUR_SCRIPT_URL_HERE"; // 여기에 실제 배포 URL을 넣으세요.
const structure = {
  "포충등(입구)": ["파리", "나방", "모기", "하루살이", "기타"],
  "포충등(포장실)": ["파리", "나방", "모기", "하루살이", "기타"],
  "보행트랩1": ["바퀴", "거미", "개미", "기타1"],
  "보행트랩2": ["바퀴", "거미", "개미", "기타1"],
  "보행트랩3": ["바퀴", "거미", "개미", "기타1"],
  "보행트랩4": ["바퀴", "거미", "개미", "기타1"],
  "방서트랩1": ["쥐", "기타2"],
  "방서트랩2": ["쥐", "기타2"],
  "방서트랩3": ["쥐", "기타2"],
  "방서트랩4": ["쥐", "기타2"]
};

let completedGroups = [];
let serverDetails = {};

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("date").valueAsDate = new Date();
  initForm();
  checkStatus();
});

function initForm() {
  const container = document.getElementById("sections");
  container.innerHTML = "";
  for (const [cat, subs] of Object.entries(structure)) {
    const section = document.createElement("div");
    section.className = "entry hidden";
    section.dataset.category = cat;
    section.innerHTML = `<h3>${cat}</h3><div class="input-row">${subs.map(s => `
      <div class="input-group"><div>${s}</div><input type="number" data-sub="${s}" value="0"></div>
    `).join("")}</div>`;
    container.appendChild(section);
  }
}

async function checkStatus() {
  const date = document.getElementById("date").value;
  const loading = document.getElementById("loadingMsg");
  loading.style.display = "block";
  
  try {
    const res = await fetch(`${scriptUrl}?checkPestStatus=true&date=${date}`);
    const result = await res.json();
    completedGroups = result.groups || [];
    serverDetails = result.details || {};

    document.getElementById("statusArea").classList.toggle("hidden", completedGroups.length === 0);
    document.getElementById("statusArea").innerHTML = `📍 완료그룹: ${completedGroups.join(", ") || "없음"}`;
    document.getElementById("deleteAllBtn").classList.toggle("hidden", completedGroups.length === 0);
    document.getElementById("modeButtons").classList.toggle("hidden", completedGroups.length > 0);
    document.getElementById("groupArea").classList.toggle("hidden", completedGroups.length === 0);
    document.getElementById("sections").classList.add("hidden");
    
    updateGroupSelect();
  } catch(e) { console.error(e); }
  finally { loading.style.display = "none"; }
}

function updateGroupSelect() {
  const groupSelect = document.getElementById("group");
  groupSelect.value = "";
  groupSelect.querySelectorAll("option").forEach(opt => {
    if(!opt.value) return;
    opt.textContent = completedGroups.includes(opt.value) ? `${opt.value}(완료)` : opt.value;
  });
}

document.getElementById("manualModeBtn").addEventListener("click", () => {
  document.getElementById("modeButtons").classList.add("hidden");
  document.getElementById("groupArea").classList.remove("hidden");
});

document.getElementById("autoModeBtn").addEventListener("click", () => {
  if(!confirm("모든 그룹에 랜덤값을 입력하시겠습니까?")) return;
  applyRandomAll();
  document.getElementById("modeButtons").classList.add("hidden");
  document.getElementById("groupArea").classList.remove("hidden");
});

function applyRandomAll() {
  document.querySelectorAll(".entry").forEach(section => {
    const cat = section.dataset.category;
    section.querySelectorAll("input").forEach(input => {
      const sub = input.dataset.sub;
      let val = 0;
      if (cat.includes("포충등") && (sub === "하루살이" || sub === "기타")) val = Math.floor(Math.random()*6);
      else if (cat.includes("보행트랩") && sub === "기타1") val = Math.floor(Math.random()*4);
      input.value = val;
    });
  });
}

document.getElementById("group").addEventListener("change", function() {
  const group = this.value;
  if(!group) return document.getElementById("sections").classList.add("hidden");

  document.getElementById("sections").classList.remove("hidden");
  
  // 기존 데이터가 있으면 채우기
  if (completedGroups.includes(group)) {
    const data = serverDetails[group] || [];
    data.forEach(item => {
      const input = document.querySelector(`.entry[data-category="${item.category}"] input[data-sub="${item.subcategory}"]`);
      if(input) input.value = item.value;
    });
  }

  document.querySelectorAll(".entry").forEach(section => {
    section.classList.toggle("hidden", section.dataset.category.startsWith("방서트랩") && group === "생면동");
  });
});

// 전송 로직 핵심 수정
document.getElementById("trapForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const date = document.getElementById("date").value;
  const group = document.getElementById("group").value;
  if(!group) return alert("그룹을 선택하세요.");

  const entries = [];
  document.querySelectorAll(".entry:not(.hidden)").forEach(div => {
    const category = div.dataset.category;
    div.querySelectorAll("input").forEach(input => {
      entries.push({ category, subcategory: input.dataset.sub, value: parseInt(input.value) || 0 });
    });
  });

  document.getElementById("loadingMsg").style.display = "block";
  try {
    const params = new URLSearchParams();
    params.append("data", JSON.stringify({ date, group, entries }));

    const res = await fetch(scriptUrl, { method: "POST", body: params });
    alert("✅ 전송 완료!");
    location.reload();
  } catch(e) { alert("전송 실패"); }
  finally { document.getElementById("loadingMsg").style.display = "none"; }
});

document.getElementById("deleteAllBtn").addEventListener("click", async () => {
  if(!confirm("전체 삭제하시겠습니까?")) return;
  const date = document.getElementById("date").value;
  try {
    await fetch(`${scriptUrl}?type=deleteAllPest&date=${date}`, { method: "POST" });
    alert("삭제 완료");
    location.reload();
  } catch(e) { alert("삭제 오류"); }
});

document.getElementById("date").addEventListener("change", checkStatus);
</script>
</body>
</html>
