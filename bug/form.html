<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>모바일_방충_스마트폼</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 기존 스타일 유지 */
    html, body { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #f4f7f6; }
    .app-container { display: flex; flex-direction: column; height: 100%; }
    .app-header { background: #2196F3; color: white; text-align: center; padding: 15px; font-size: 1.3rem; font-weight: bold; }
    .app-body { flex: 1; overflow-y: auto; padding: 15px; }
    .status-msg { background: #e3f2fd; padding: 10px; border-radius: 8px; margin-bottom: 10px; color: #1565c0; font-weight: bold; font-size: 0.9rem; border: 1px solid #bbdefb; }
    .hidden { display: none !important; }
    .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; }
    .btn-blue { background: #2196F3; }
    .btn-green { background: #4CAF50; }
    .btn-red { background: #f44336; width: 100%; margin-top: 10px; margin-bottom: 15px; }
    .btn-orange { background: #ff9800; width: 100%; margin-bottom: 10px; }

    /* 로딩 오버레이 (마음에 들어하신 스타일) */
    #loadingOverlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.7); color: white; 
      display: none; flex-direction: column; justify-content: center; align-items: center; 
      z-index: 9999; font-size: 1.2rem; font-weight: bold;
    }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    label { display: block; margin-top: 15px; font-weight: bold; }
    input[type="date"], select { width: 100%; padding: 12px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
    .entry { border: 1px solid #ccc; padding: 12px; margin-top: 16px; border-radius: 8px; background: white; }
    .input-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .input-group { flex: 1 1 calc(33% - 8px); min-width: 80px; text-align: center; }
    .input-group input { width: 100%; text-align: center; padding: 8px; border: 1px solid #ddd; }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div id="loadingText">데이터 확인 중...</div>
</div>

<div class="app-container">
  <div class="app-header">스마트 방충 관리</div>

  <div class="app-body">
    <label>📅 날짜 선택</label>
    <input type="date" id="date">

    <button type="button" id="deleteAllBtn" class="btn btn-red hidden"></button>
    <div id="statusArea" class="status-msg hidden"></div>

    <div id="modeButtons" class="hidden" style="display:flex; gap:10px; margin-top:15px;">
      <button type="button" id="manualModeBtn" class="btn btn-blue">📝 개별 입력</button>
      <button type="button" id="autoModeBtn" class="btn btn-green">🎲 일괄 등록(랜덤)</button>
    </div>

    <button type="button" id="switchToManualBtn" class="btn btn-orange hidden">🔄 개별 등록 모드로 전환</button>

    <div id="groupArea" class="hidden">
      <label>⚙ 그룹 선택</label>
      <select id="group">
        <option value="">선택하세요</option>
        <option value="건면동">건면동</option>
        <option value="생면동">생면동</option>
      </select>
    </div>

    <form id="trapForm">
      <div id="sections"></div>
    </form>
  </div>

  <div class="app-footer">
    <button type="submit" form="trapForm" id="submitBtn" class="btn btn-green" style="width:100%; border-radius:0; height:60px; font-size:1.2rem;">📥 서버로 전송하기</button>
  </div>
</div>

<script>
const scriptUrl = "https://script.google.com/macros/s/AKfycbyXDgR9f1iXIu3mOTUR6TNGaH5xjLyFay1jCXjkrU0ictIwtf7NRiwbd6Vm4Gak6zJSnw/exec";
const structure = {
  "포충등(입구)": ["파리", "나방", "모기", "하루살이", "기타"],
  "포충등(포장실)": ["파리", "나방", "모기", "하루살이", "기타"],
  "보행트랩1": ["바퀴", "거미", "개미", "기타1"],
  "보행트랩2": ["바퀴", "거미", "개미", "기타1"],
  "보행트랩3": ["바퀴", "거미", "개미", "기타1"],
  "보행트랩4": ["바퀴", "거미", "개미", "기타1"],
  "방서트랩1": ["쥐", "기타2"],
  "방서트랩2": ["쥐", "기타2"],
  "방서트랩3": ["쥐", "기타2"],
  "방서트랩4": ["쥐", "기타2"]
};

const loadingOverlay = document.getElementById("loadingOverlay");
const loadingText = document.getElementById("loadingText");

function showLoading(msg) {
  loadingText.textContent = msg;
  loadingOverlay.style.display = "flex";
}

function hideLoading() {
  loadingOverlay.style.display = "none";
}

// 상태 체크 및 UI 동기화
async function checkStatus() {
  const date = document.getElementById("date").value;
  showLoading("🔄 최신 상태 확인 중...");
  
  try {
    const res = await fetch(`${scriptUrl}?checkPestStatus=true&date=${date}`);
    const result = await res.json();
    
    const completedGroups = result.groups || [];
    serverDetails = result.details || {};

    // UI 초기화
    document.getElementById("statusArea").classList.toggle("hidden", completedGroups.length === 0);
    document.getElementById("statusArea").innerHTML = `📍 완료그룹: ${completedGroups.join(", ")}`;
    document.getElementById("deleteAllBtn").classList.toggle("hidden", completedGroups.length === 0);
    document.getElementById("deleteAllBtn").textContent = `🗑 ${date} 전체삭제`;
    
    document.getElementById("modeButtons").classList.toggle("hidden", completedGroups.length > 0);
    document.getElementById("groupArea").classList.toggle("hidden", completedGroups.length === 0);
    
    updateGroupSelect(completedGroups);
  } catch(e) { console.error(e); } 
  finally { hideLoading(); }
}

function updateGroupSelect(completed) {
  const groupSelect = document.getElementById("group");
  groupSelect.querySelectorAll("option").forEach(opt => {
    if(!opt.value) return;
    opt.textContent = completed.includes(opt.value) ? `${opt.value}(완료)` : opt.value;
  });
}

// 일괄 등록 모드 (랜덤 생성 및 즉시 전송)
document.getElementById("autoModeBtn").addEventListener("click", async () => {
  const date = document.getElementById("date").value;
  if(!date) return alert("날짜를 먼저 선택해주세요.");
  if(!confirm(`${date} 날짜로 모든 그룹(건면동, 생면동) 데이터를 일괄 등록하시겠습니까?`)) return;

  showLoading("🚀 전 구역 일괄 데이터 생성 및 전송 중...");

  // 1. 데이터 생성 (건면동 & 생면동)
  const bulkData = ["건면동", "생면동"].map(g => {
    const entries = [];
    for (const [cat, subs] of Object.entries(structure)) {
      if (g === "생면동" && cat.startsWith("방서트랩")) continue;
      subs.forEach(s => {
        let val = 0;
        if (cat.includes("포충등") && (s === "하루살이" || s === "기타")) val = Math.floor(Math.random()*6);
        else if (cat.includes("보행트랩") && s === "기타1") val = Math.floor(Math.random()*4);
        entries.push({ category: cat, subcategory: s, value: val });
      });
    }
    return { group: g, entries: entries };
  });

  try {
    const params = new URLSearchParams();
    params.append("type", "bulkPest");
    params.append("date", date);
    params.append("data", JSON.stringify(bulkData));

    const response = await fetch(scriptUrl, { method: "POST", body: params });
    const result = await response.text();

    hideLoading();
    alert("✅ 일괄 등록이 완료되었습니다!");

    // 핵심: 일괄 등록 후 UI를 리셋하고 서버 상태를 다시 조회합니다.
    // 이렇게 하면 '개별모드 전환' 버튼 대신 '삭제' 버튼과 '(완료)' 목록이 나타납니다.
    document.getElementById("switchToManualBtn").classList.add("hidden"); 
    document.getElementById("submitBtn").classList.remove("hidden");
    
    // 서버의 최신 데이터를 다시 읽어와서 (완료) 표시와 삭제 버튼을 띄움
    await checkStatus(); 

  } catch (e) {
    hideLoading();
    alert("일괄 등록 중 오류 발생: " + e.message);
  }
});

// 삭제 버튼
document.getElementById("deleteAllBtn").addEventListener("click", async () => {
  const date = document.getElementById("date").value;
  if(!confirm("정말 삭제하시겠습니까?")) return;

  showLoading("🗑️ 데이터 삭제 중...");
  try {
    const params = new URLSearchParams();
    params.append("type", "deleteAllPest");
    params.append("date", date);
    await fetch(scriptUrl, { method: "POST", body: params });
    hideLoading();
    alert("삭제되었습니다.");
    checkStatus();
  } catch(e) { 
    hideLoading();
    alert("삭제 실패"); 
  }
});

// 개별 전송
document.getElementById("trapForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const group = document.getElementById("group").value;
  if(!group) return alert("그룹 선택 필수");

  showLoading("📥 데이터 저장 중...");
  const entries = [];
  document.querySelectorAll(".entry:not(.hidden)").forEach(div => {
    const cat = div.dataset.category;
    div.querySelectorAll("input").forEach(i => {
      entries.push({ category: cat, subcategory: i.dataset.sub, value: i.value });
    });
  });

  try {
    const params = new URLSearchParams();
    params.append("data", JSON.stringify({ date: document.getElementById("date").value, group, entries }));
    await fetch(scriptUrl, { method: "POST", body: params });
    hideLoading();
    alert("저장 완료");
    checkStatus();
  } catch(e) { 
    hideLoading();
    alert("저장 실패"); 
  }
});

// 모드 전환
document.getElementById("switchToManualBtn").addEventListener("click", () => {
  document.getElementById("switchToManualBtn").classList.add("hidden");
  document.getElementById("submitBtn").classList.remove("hidden");
  document.getElementById("groupArea").classList.remove("hidden");
});

document.getElementById("date").addEventListener("change", checkStatus);
document.getElementById("manualModeBtn").addEventListener("click", () => {
  document.getElementById("modeButtons").classList.add("hidden");
  document.getElementById("groupArea").classList.remove("hidden");
});

// 초기화
(function init() {
  const container = document.getElementById("sections");
  for (const [cat, subs] of Object.entries(structure)) {
    const div = document.createElement("div");
    div.className = "entry hidden";
    div.dataset.category = cat;
    div.innerHTML = `<h3>${cat}</h3><div class="input-row">${subs.map(s => `
      <div class="input-group"><div>${s}</div><input type="number" data-sub="${s}" value="0"></div>
    `).join("")}</div>`;
    container.appendChild(div);
  }
  checkStatus();
})();
</script>
</body>
</html>
